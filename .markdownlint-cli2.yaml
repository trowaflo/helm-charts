# markdownlint-cli2 configuration
# https://github.com/DavidAnson/markdownlint-cli2

ignores:
  - "charts/**/README.md"  # auto-generated by helm-docs
  - "tests/**/README.md"   # auto-generated by helm-docs
  - ".claude/**"           # internal Claude commands and memory files

config:
  MD013: false  # line-length: too strict for technical docs
