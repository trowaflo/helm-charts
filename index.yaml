  graphite-exporter:
  - apiVersion: v2
    created: "2026-04-22T17:44:02.577614416Z"
    dependencies:
    - name: common
      repository: https://trowaflo.github.io/helm-charts
      version: 2.1.2
    description: Prometheus exporter for converting Graphite plaintext protocol metrics
      to Prometheus format. Enables Prometheus to scrape metrics from legacy Graphite
