---
# -- Override the Helm-generated release name. Lower priority than fullnameOverride
# @section -- Global settings
nameOverride: ''
# -- Fully override the chart name for Kubernetes resource names. Useful when deploying multiple instances with the same chart
# @section -- Global settings
fullnameOverride: ''
# -- Override the namespace where resources are deployed. Leave empty to use the release namespace
# @section -- Global settings
namespaceOverride: ''

# -- Deployments configuration. Define one or more deployments under the 'deployments' key.
# Each deployment must specify its own containers, replicas, and pod-level settings.
# @section -- Deployments configuration
deployments: {}

# -- StatefulSets configuration. Define one or more stateful workloads under the 'statefulsets' key.
# @section -- StatefulSets configuration
statefulsets: {}

# -- CronJobs configuration. Define one or more scheduled jobs under the 'cronjobs' key.
# @section -- CronJobs configuration
cronjobs: {}

# -- Jobs configuration. Define one or more one-shot jobs under the 'jobs' key.
# @section -- Jobs configuration
jobs: {}

# -- CloudNativePG Clusters configuration. Define one or more clusters under the 'cnpgClusters' key.
# @section -- CNPG Clusters configuration
cnpgClusters: {}

# -- Service configuration. Additional services can be added under the 'k8sServices' key.
# @section -- Services configuration
k8sServices:
  main:
    enabled: true
    type: ClusterIP
    annotations: {}
    labels: {}
    ports:
      main:
        protocol: TCP
        port: 80

# -- Ingress configuration. Additional ingress resources can be added under the 'ingresses' key.
# @section -- Ingress configuration
ingresses:
  main:
    enabled: false
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: Prefix
          - path: /testpath
            pathType: Prefix
      # @ignored -- Example of adding another host to the Ingress configuration
      - host: another-chart-example.local
        paths:
          - path: /
            pathType: Prefix
          - path: /testpath
            pathType: Prefix

# -- Monitoring configuration. Additional monitoring resources can be added under the 'serviceMonitors' key.
# @section -- Monitoring configuration
serviceMonitors:
  main:
    enabled: true
    labels:
      release: prometheus
    endpoints:
      - port: main
        metricRelabelings:
          - action: replace
            sourceLabels: ["__name__"]
            regex: "olstring_(.*)"
            replacement: "newstring_$1"
            targetLabel: "__name__"
