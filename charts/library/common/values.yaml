---
replicaCount: 1
revisionHistoryLimit: 3
fullnameOverride: ''
containers:
  - name: main-container
env:
  - name: "ENVVAR"
    value: "TEST"
image:
  pullPolicy: Always
  repository: traefik/whoami
  tag: v1.10@sha256:1699d99cb4b9acc17f74ca670b3d8d0b7ba27c948b3445f0593b58ebece92f04
imagePullSecrets: []
nameOverride: ''
namespaceOverride: ''
probes:
  enabled: true
  liveness:
    enabled: true
    failureThreshold: 3
    httpGet:
      path: /health
      port: http
      scheme: HTTP
    initialDelaySeconds: 30
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5
  readiness:
    enabled: true
    failureThreshold: 3
    httpGet:
      path: /health
      port: http
      scheme: HTTP
    initialDelaySeconds: 30
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5
  startup:
    enabled: true
    failureThreshold: 3
    httpGet:
      path: /health
      port: http
      scheme: HTTP
    initialDelaySeconds: 60
    periodSeconds: 10
    successThreshold: 1
    timeoutSeconds: 5
resources:
  limits:
    cpu: 2
    memory: 2Gi
  requests:
    cpu: 1m
    memory: 32Mi
podSecurityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65534
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: ["ALL"]
  readOnlyRootFilesystem: true
services:
  annotations: {}
  labels: {}
  ports:
    - name: http
      port: 80
      protocol: UDP
    - name: https
      port: 443
      protocol: TCP
serviceMonitor:
  enabled: true
  labels:
    release: prometheus
  endpoints:
    port: https
strategyType: Recreate
