---
# Source: common-test/templates/common.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-common-test
  namespace: release-name-common-test
  labels:
    app.kubernetes.io/name: common-test
    helm.sh/chart: common-test-0.1.0
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: common-test
      app.kubernetes.io/instance: release-name
  template:
    metadata:
      labels:
        app.kubernetes.io/name: common-test
        app.kubernetes.io/instance: release-name
      annotations:
    spec:
      automountServiceAccountToken: false
      containers:
        - name: common-test
          image: "traefik/whoami:v1.10@sha256:1699d99cb4b9acc17f74ca670b3d8d0b7ba27c948b3445f0593b58ebece92f04"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: UDP
            - name: https
              containerPort: 443
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: exporter
              scheme: HTTP
            initialDelaySeconds: 30
            failureThreshold: 3
            successThreshold: 1
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: exporter
              scheme: HTTP
            initialDelaySeconds: 30
            failureThreshold: 3
            successThreshold: 1
            periodSeconds: 10
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: exporter
              scheme: HTTP
            initialDelaySeconds: 30
            failureThreshold: 3
            successThreshold: 1
            periodSeconds: 10
            timeoutSeconds: 5
          env:
            - name: ENVVAR
              value: TEST
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 1m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10000
            seccompProfile:
              type: RuntimeDefault
...
---
# Source: common-test/templates/common.yaml
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: release-name-common-test
  namespace: release-name-common-test
  labels:
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: common-test
      app.kubernetes.io/instance: release-name
  endpoints:
    - port: https
...
