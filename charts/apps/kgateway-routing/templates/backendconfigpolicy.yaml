{{- range $routeKey, $route := .Values.routes }}
{{- if $route.enabled }}
{{- $routeNamespace := default $.Release.Namespace $route.namespace }}
{{- $tlsTargets := list }}
{{- /* outCluster TLS: target the generated Backend CRD */ -}}
{{- range $backend := $route.outCluster }}
  {{- if $backend.tls }}
    {{- $tlsTargets = append $tlsTargets (dict
        "group" "gateway.kgateway.dev"
        "kind" "Backend"
        "name" (printf "%s-%s-backend" $routeKey $backend.name)
        "backend" $backend) }}
  {{- end }}
{{- end }}
{{- /* inCluster TLS: target the Kubernetes Service directly (kgateway has no Kube backend type) */ -}}
{{- range $backend := $route.inCluster }}
  {{- if $backend.tls }}
    {{- $tlsTargets = append $tlsTargets (dict
        "group" ""
        "kind" "Service"
        "name" $backend.name
        "backend" $backend) }}
  {{- end }}
{{- end }}
{{- if $tlsTargets }}
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: BackendConfigPolicy
metadata:
  name: {{ printf "%s-%s-policy" $.Release.Name $routeKey }}
  namespace: {{ $routeNamespace }}
  labels:
    {{- include "kgateway-routing.labels" $ | nindent 4 }}
spec:
  targetRefs:
    {{- range $target := $tlsTargets }}
    - group: {{ $target.group | quote }}
      kind: {{ $target.kind }}
      name: {{ $target.name }}
    {{- end }}
  tls:
    {{- $firstBackend := (index $tlsTargets 0).backend }}
    {{- if $firstBackend.sni }}
    sni: {{ $firstBackend.sni }}
    {{- else if $firstBackend.host }}
    sni: {{ $firstBackend.host }}
    {{- else }}
    sni: {{ $firstBackend.name }}
    {{- end }}
    {{- if $firstBackend.insecure }}
    insecureSkipVerify: true
    {{- end }}
{{- end }}
{{- end }}
{{- end }}
