suite: test inCluster with TLS
templates:
  - templates/httproute.yaml
  - templates/backend.yaml
  - templates/backendconfigpolicy.yaml
tests:
  - it: should not create Backend CRD for inCluster service with TLS (kgateway has no Kube type)
    template: templates/backend.yaml
    set:
      routes:
        api:
          enabled: true
          hostnames: ["api.example.com"]
          parentRefs:
            - name: gateway
              namespace: kgateway-system
          inCluster:
            - name: api-service
              port: 8443
              tls: true
              insecure: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create Backend CRD for inCluster service without TLS
    template: templates/backend.yaml
    set:
      routes:
        api:
          enabled: true
          hostnames: ["api.example.com"]
          parentRefs:
            - name: gateway
              namespace: kgateway-system
          inCluster:
            - name: api-service
              port: 80
    asserts:
      - hasDocuments:
          count: 0

  - it: should reference the Service directly in HTTPRoute even when TLS is enabled
    template: templates/httproute.yaml
    set:
      routes:
        api:
          enabled: true
          hostnames: ["api.example.com"]
          parentRefs:
            - name: gateway
              namespace: kgateway-system
          inCluster:
            - name: api-service
              port: 8443
              tls: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HTTPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].group
          value: ""
      - equal:
          path: spec.rules[0].backendRefs[0].kind
          value: Service
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: api-service
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 8443

  - it: should reference Service directly when inCluster has no TLS
    template: templates/httproute.yaml
    set:
      routes:
        api:
          enabled: true
          hostnames: ["api.example.com"]
          parentRefs:
            - name: gateway
              namespace: kgateway-system
          inCluster:
            - name: api-service
              port: 80
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: HTTPRoute
      - equal:
          path: spec.rules[0].backendRefs[0].group
          value: ""
      - equal:
          path: spec.rules[0].backendRefs[0].kind
          value: Service
      - equal:
          path: spec.rules[0].backendRefs[0].name
          value: api-service
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 80

  - it: should generate one Backend CRD for outCluster TLS only when mixed with inCluster TLS
    template: templates/backend.yaml
    set:
      routes:
        mixed:
          enabled: true
          hostnames: ["mixed.example.com"]
          parentRefs:
            - name: gateway
              namespace: kgateway-system
          inCluster:
            - name: internal-api
              port: 8443
              tls: true
          outCluster:
            - name: external-api
              host: external.example.com
              port: 443
              tls: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Backend
      - equal:
          path: metadata.name
          value: mixed-external-api-backend
      - equal:
          path: spec.type
          value: Static

  - it: should target the Service via BackendConfigPolicy targetRefs for inCluster TLS
    template: templates/backendconfigpolicy.yaml
    set:
      routes:
        api:
          enabled: true
          hostnames: ["api.example.com"]
          parentRefs:
            - name: gateway
              namespace: kgateway-system
          inCluster:
            - name: api-service
              port: 8443
              tls: true
              insecure: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: BackendConfigPolicy
      - equal:
          path: spec.targetRefs[0].group
          value: ""
      - equal:
          path: spec.targetRefs[0].kind
          value: Service
      - equal:
          path: spec.targetRefs[0].name
          value: api-service
      - equal:
          path: spec.tls.sni
          value: api-service
      - equal:
          path: spec.tls.insecureSkipVerify
          value: true

  - it: should place BackendConfigPolicy in custom namespace when route has one
    template: templates/backendconfigpolicy.yaml
    set:
      routes:
        api:
          enabled: true
          namespace: custom-ns
          hostnames: ["api.example.com"]
          parentRefs:
            - name: gateway
              namespace: kgateway-system
          inCluster:
            - name: api-service
              port: 8443
              tls: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.namespace
          value: custom-ns
      - equal:
          path: spec.targetRefs[0].name
          value: api-service
