suite: test kgateway-routing chart - per-route securityHeaders opt-in
release:
  name: kgateway-routing-test
  namespace: kgateway-test
templates:
  - templates/httproute.yaml
tests:
  - it: should inject ResponseHeaderModifier filter when route opts in (outCluster)
    template: templates/httproute.yaml
    values:
      - values/security-headers.yaml
    documentSelector:
      path: metadata.name
      value: public
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: spec.rules[0].filters[0].type
          value: ResponseHeaderModifier
      - equal:
          path: spec.rules[0].filters[0].responseHeaderModifier.set[0].name
          value: Strict-Transport-Security
      - equal:
          path: spec.rules[0].filters[0].responseHeaderModifier.set[1].name
          value: X-Frame-Options
      - equal:
          path: spec.rules[0].filters[0].responseHeaderModifier.set[1].value
          value: DENY
      - contains:
          path: spec.rules[0].filters[0].responseHeaderModifier.remove
          content: Server

  - it: should NOT inject any filter when route does not opt in
    template: templates/httproute.yaml
    values:
      - values/security-headers.yaml
    documentSelector:
      path: metadata.name
      value: private
    asserts:
      - isKind:
          of: HTTPRoute
      - notExists:
          path: spec.rules[0].filters

  - it: should prepend securityHeaders filter before user filters (inCluster)
    template: templates/httproute.yaml
    values:
      - values/security-headers.yaml
    documentSelector:
      path: metadata.name
      value: extra
    asserts:
      - isKind:
          of: HTTPRoute
      - lengthEqual:
          path: spec.rules[0].filters
          count: 2
      - equal:
          path: spec.rules[0].filters[0].type
          value: ResponseHeaderModifier
      - equal:
          path: spec.rules[0].filters[1].type
          value: RequestHeaderModifier
      - equal:
          path: spec.rules[0].filters[1].requestHeaderModifier.set[0].name
          value: X-Forwarded-Proto

  - it: should allow overriding the global header list
    template: templates/httproute.yaml
    set:
      securityHeaders:
        set:
          - name: X-Custom-Sec
            value: enabled
        remove:
          - X-Powered-By
      routes:
        public:
          enabled: true
          securityHeaders: true
          hostnames:
            - public.example.com
          parentRefs:
            - name: public-gateway
              namespace: kgateway-system
          inCluster:
            - name: svc
              port: 80
    documentSelector:
      path: metadata.name
      value: public
    asserts:
      - lengthEqual:
          path: spec.rules[0].filters[0].responseHeaderModifier.set
          count: 1
      - equal:
          path: spec.rules[0].filters[0].responseHeaderModifier.set[0].name
          value: X-Custom-Sec
      - lengthEqual:
          path: spec.rules[0].filters[0].responseHeaderModifier.remove
          count: 1
      - equal:
          path: spec.rules[0].filters[0].responseHeaderModifier.remove[0]
          value: X-Powered-By
