{{/*
TrafficPolicy attached to a Gateway.

Iterates over .Values.trafficPolicies. For each entry where enabled=true and
targetGateway references an enabled gateway, renders a TrafficPolicy targeting
that gateway with the user-provided spec body merged under spec:.

Typical use case: gateway-wide concerns like security headers, request/response
transformations, observability — anything that should apply uniformly to every
route attached to a given gateway.

The user provides only the spec BODY (transformation/rateLimit/extAuth/etc.).
The chart auto-fills spec.targetRefs from targetGateway; putting `targetRefs`
in your spec block will be ignored.
*/}}
{{- $namespace := include "kgateway-platform.namespace" . -}}
{{- range $policyKey, $policy := .Values.trafficPolicies }}
  {{- if $policy.enabled }}
    {{- $targetGateway := $policy.targetGateway -}}
    {{- if not $targetGateway }}
      {{- fail (printf "trafficPolicies.%s.targetGateway is required" $policyKey) }}
    {{- end }}
    {{- $gatewayCfg := index $.Values.gateways $targetGateway -}}
    {{- if not $gatewayCfg }}
      {{- fail (printf "trafficPolicies.%s.targetGateway '%s' does not exist in gateways map" $policyKey $targetGateway) }}
    {{- end }}
    {{- if $gatewayCfg.enabled }}
      {{- $gatewayName := include "kgateway-platform.gatewayName" (dict "root" $ "key" $targetGateway "config" $gatewayCfg) -}}
      {{- $fullname := include "kgateway-platform.fullname" $ -}}
      {{- $policyName := default (printf "%s-%s" $fullname $policyKey) $policy.name }}
{{- if $.Capabilities.APIVersions.Has "gateway.kgateway.dev/v1alpha1/TrafficPolicy" }}
---
apiVersion: gateway.kgateway.dev/v1alpha1
kind: TrafficPolicy
metadata:
  name: {{ $policyName | trunc 63 | trimSuffix "-" }}
  namespace: {{ $namespace }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ $gatewayName }}
  {{- with $policy.spec }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
{{- else }}
{{- fail "kgateway TrafficPolicy CRD not available; install CRDs or disable trafficPolicies.*.enabled" }}
{{- end }}
    {{- end }}
  {{- end }}
{{- end }}
