---
# mDNS repeater bridges Multicast DNS across network interfaces.
# It MUST run with hostNetwork to see both physical and cluster network interfaces.
# dnsPolicy is set to ClusterFirstWithHostNet to preserve cluster DNS resolution.
#
# REQUIRED: set args to the interfaces you want to bridge.
# List at least two interface names:
#   - one physical NIC on the host (e.g. eth0, eno1, enp3s0)
#   - one cluster/CNI interface (e.g. eth1, flannel.1, cni0, vxlan.calico, cilium_host)
# Run `ip link show` on a cluster node to list available interfaces.

daemonsets:
  main:
    enabled: true
    updateStrategy:
      type: RollingUpdate
    podSpec:
      hostNetwork: true
      # ClusterFirstWithHostNet preserves cluster DNS when hostNetwork is enabled
      dnsPolicy: ClusterFirstWithHostNet
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        fsGroupChangePolicy: OnRootMismatch
      containers:
        main:
          image:
            repository: ghcr.io/angelnu/mdns-repeater
            # Pin to a digest for production, e.g.: latest@sha256:<digest>
            tag: latest
            pullPolicy: IfNotPresent
          # Interfaces to bridge — adjust to match your node's network interfaces
          args:
            - eth0
            - eth1
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - NET_RAW
          resources:
            limits:
              cpu: 50m
              memory: 32Mi
            requests:
              cpu: 1m
              memory: 16Mi
