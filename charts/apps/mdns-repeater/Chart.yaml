apiVersion: v2
name: mdns-repeater
version: 0.1.0
appVersion: "latest"
type: application
description: |-
  mDNS repeater that bridges Multicast DNS traffic between Kubernetes pod networks
  and physical host networks. Enables mDNS-based service discovery (Bonjour,
  Avahi) across network boundaries in a home lab or small office environment.
keywords:
  - mdns
  - bonjour
  - avahi
  - multicast
  - discovery
  - networking
home: https://github.com/angelnu/mdns-repeater
maintainers:
  - name: trowaflo
    email: trowa.flo@gmail.com
sources:
  - https://github.com/angelnu/mdns-repeater
  - https://github.com/trowaflo/helm-charts

dependencies:
  - name: common
    version: 3.1.0
    repository: file://../../library/common
