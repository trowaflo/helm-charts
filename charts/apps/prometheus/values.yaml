---
# -- Prometheus server and monitoring stack configuration wrapping prometheus-community/kube-prometheus-stack Helm chart
prometheus:
  # -- Prometheus server component configuration handling metrics scraping and long-term storage
  server:

    # -- File path to Prometheus configuration file within the container filesystem
    # The configuration file defines scrape jobs, recording rules, alert rules, and target discovery settings
    configPath: /etc/config/prometheus.yml

    # -- Persistent storage configuration for Prometheus time-series database ensuring data durability
    persistentVolume:
      # -- Enable persistent volume claim to retain metrics across pod restarts and rescheduling
      # If false, metrics are stored in ephemeral emptyDir (lost on pod termination)
      enabled: false
      # -- Existing persistent volume name to bind with the claim (leave empty for dynamic provisioning)
      volumeName: ""
      # -- Kubernetes storage class for dynamic PV provisioning (use "-" to disable provisioning)
      # Examples: "fast-ssd", "standard", "local" depending on your cluster
      storageClass: "-"
      # -- Persistent volume size for time-series metrics storage (adjust based on retention and scrape volume)
      # Estimate: 1GB per week per 1000 metric series at 15-second scrape intervals
      size: 10Gi
      # -- NFS-backed persistent storage configuration for shared access across nodes
      nfs:
        # -- Enable NFS backing for the persistent volume (useful for distributed clusters)
        enabled: false
        # -- NFS server IP address or hostname providing the storage endpoint
        server: 10.0.0.1
        # -- NFS export path on the server accessible to Kubernetes nodes

        path: /path

    # -- Kubernetes Service exposing Prometheus query and admin endpoints
    service:
      # -- Create the Prometheus Service resource for internal and external access
      # If false, no Service will be created and you must access Prometheus via port-forward or Ingress
      enabled: true

    # -- Kubernetes Ingress configuration for HTTP(S) external access (standard Ingress controller)
    ingress:
      # -- Enable traditional Ingress for external traffic routing via your cluster Ingress controller
      # Set to true to use with nginx-ingress, AWS ALB, or other Ingress controllers
      enabled: false

    # -- Traefik IngressRoute custom resource for advanced routing with middleware and SSL
    ingressroute:
      # -- Enable Traefik IngressRoute for advanced routing capabilities and middleware integration
      # Requires Traefik to be installed in the cluster
      enabled: true
      # -- HTTP path prefix for accessing Prometheus UI and API (e.g., https://domain/prometheus/)
      path: /prometheus/

    # -- Prometheus TSDB data retention period determining how long metrics are stored
    # Older metrics are automatically deleted when this period expires
    # Adjust based on storage capacity and historical data needs
    retention: "15w"

  # -- Kubernetes NetworkPolicy configuration for network isolation and traffic control
  networkPolicy:
    # -- Enable creation of NetworkPolicy resources restricting traffic to/from Prometheus
    # Set to false if your cluster doesn't use network policies or if you need unrestricted access
    enabled: true

  # -- Configuration of dependency subcharts defined in Chart.yaml dependencies
  # These are optional components from prometheus-community Helm charts

  # -- Alertmanager configuration for alert routing, grouping, and notification management
  # See: https://github.com/prometheus-community/helm-charts/tree/main/charts/alertmanager
  alertmanager:
    # -- Deploy Alertmanager component for alert routing and notifications
    # Set to false to disable alerting and use external Alertmanager instead
    enabled: false

  # -- kube-state-metrics configuration for Kubernetes resource state metrics
  # See: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-state-metrics
  kube-state-metrics:
    # -- Deploy kube-state-metrics subchart for Kubernetes object state monitoring
    # Provides metrics like pod_info, deployment_replicas_desired, node_status, etc.
    enabled: true

  # -- Prometheus Node Exporter configuration for hardware/host metrics collection
  # See: https://github.com/prometheus-community/helm-charts/tree/main/charts/prometheus-node-exporter
  prometheus-node-exporter:
    # -- Deploy node-exporter DaemonSet for per-node CPU, memory, disk, and network metrics
    enabled: true

    # -- RBAC (Role-Based Access Control) configuration for node-exporter
    rbac:
      # -- Disable pod security policy (deprecated Kubernetes 1.25+)
      pspEnabled: false

    # -- Pod-level security context for node-exporter container hardening
    containerSecurityContext:
      # -- Prevent privilege escalation for the node-exporter container
      allowPrivilegeEscalation: false

  # -- Prometheus PushGateway configuration for ephemeral job metrics collection
  # See: https://github.com/prometheus-community/helm-charts/tree/main/charts/prometheus-pushgateway
  prometheus-pushgateway:
    # -- Deploy PushGateway for batch jobs and short-lived processes to push metrics
    # Only needed if you have cron jobs, lambda functions, or other ephemeral workloads
    enabled: false

  # -- Scrape job configurations defining targets and metric collection settings
  # Each job specifies how to discover, authenticate, and scrape targets
  scrape_configs:
    # -- Prometheus self-monitoring job scraping its own metrics endpoint for internal health monitoring
    - job_name: prometheus
      static_configs:
        - targets:
          - localhost:9090

    # -- Kubernetes API server metrics collection job using Kubernetes service discovery
    # Provides metrics on API server latency, request counts, and etcd performance
    # A scrape configuration for running Prometheus on a Kubernetes cluster.
    # This uses separate scrape configs for cluster components (i.e. API server, node)
    # and services to allow each to use different authentication configs.
    #
    # Kubernetes labels will be added as Prometheus labels on metrics via the
    # `labelmap` relabeling action.

    # Scrape config for API servers.
    #
    # Kubernetes exposes API servers as endpoints to the default/kubernetes
    # service so this uses `endpoints` role and uses relabelling to only keep
    # the endpoints associated with the default/kubernetes service using the
    # default named port `https`. This works for single API server deployments as
    # well as HA API server deployments.
    - job_name: 'kubernetes-apiservers'

      kubernetes_sd_configs:
        - role: endpoints

      # Default to scraping over https. If required, just disable this or change to
      # `http`.
      scheme: https

      # This TLS & bearer token file config is used to connect to the actual scrape
      # endpoints for cluster components. This is separate to discovery auth
      # configuration because discovery & scraping are two separate concerns in
      # Prometheus. The discovery auth config is automatic if Prometheus runs inside
      # the cluster. Otherwise, more config options have to be provided within the
      # <kubernetes_sd_config>.
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        # If your node certificates are self-signed or use a different CA to the
        # master CA, then disable certificate verification below. Note that
        # certificate verification is an integral part of a secure infrastructure
        # so this should only be disabled in a controlled environment. You can
        # disable certificate verification by uncommenting the line below.
        #
        insecure_skip_verify: true
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

      # Keep only the default/kubernetes service endpoints for the https port. This
      # will add targets for each API server which Kubernetes adds an endpoint to
      # the default/kubernetes service.
      relabel_configs:
        - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
          action: keep
          regex: default;kubernetes;https

    # -- Kubernetes node metrics scraping job collecting per-node CPU, memory, disk, and kubelet metrics
    - job_name: 'kubernetes-nodes'

      # Default to scraping over https. If required, just disable this or change to
      # `http`.
      scheme: https

      # This TLS & bearer token file config is used to connect to the actual scrape
      # endpoints for cluster components. This is separate to discovery auth
      # configuration because discovery & scraping are two separate concerns in
      # Prometheus. The discovery auth config is automatic if Prometheus runs inside
      # the cluster. Otherwise, more config options have to be provided within the
      # <kubernetes_sd_config>.
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        # If your node certificates are self-signed or use a different CA to the
        # master CA, then disable certificate verification below. Note that
        # certificate verification is an integral part of a secure infrastructure
        # so this should only be disabled in a controlled environment. You can
        # disable certificate verification by uncommenting the line below.
        #
        insecure_skip_verify: true
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

      kubernetes_sd_configs:
        - role: node

      relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - target_label: __address__
          replacement: kubernetes.default.svc:443
        - source_labels: [__meta_kubernetes_node_name]
          regex: (.+)
          target_label: __metrics_path__
          replacement: /api/v1/nodes/$1/proxy/metrics


    # -- cAdvisor container metrics collection from kubelet endpoint (CPU, memory, disk usage per container)
    - job_name: 'kubernetes-nodes-cadvisor'

      # Default to scraping over https. If required, just disable this or change to
      # `http`.
      scheme: https

      # This TLS & bearer token file config is used to connect to the actual scrape
      # endpoints for cluster components. This is separate to discovery auth
      # configuration because discovery & scraping are two separate concerns in
      # Prometheus. The discovery auth config is automatic if Prometheus runs inside
      # the cluster. Otherwise, more config options have to be provided within the
      # <kubernetes_sd_config>.
      tls_config:
        ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        # If your node certificates are self-signed or use a different CA to the
        # master CA, then disable certificate verification below. Note that
        # certificate verification is an integral part of a secure infrastructure
        # so this should only be disabled in a controlled environment. You can
        # disable certificate verification by uncommenting the line below.
        #
        insecure_skip_verify: true
      bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

      kubernetes_sd_configs:
        - role: node

      # This configuration will work only on kubelet 1.7.3+
      # As the scrape endpoints for cAdvisor have changed
      # if you are using older version you need to change the replacement to
      # replacement: /api/v1/nodes/$1:4194/proxy/metrics
      # more info here https://github.com/coreos/prometheus-operator/issues/633
      relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - target_label: __address__
          replacement: kubernetes.default.svc:443
        - source_labels: [__meta_kubernetes_node_name]
          regex: (.+)
          target_label: __metrics_path__
          replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

      # Metric relabel configs to apply to samples before ingestion.
      # [Metric Relabeling](https://prometheus.io/docs/prometheus/latest/configuration/configuration/#metric_relabel_configs)
      # metric_relabel_configs:
      # - action: labeldrop
      #   regex: (kubernetes_io_hostname|failure_domain_beta_kubernetes_io_region|beta_kubernetes_io_os|beta_kubernetes_io_arch|beta_kubernetes_io_instance_type|failure_domain_beta_kubernetes_io_zone)

    # -- Service endpoint metrics scraping job using pod annotations to discover exporters and metrics endpoints
    # Scrape config for service endpoints.
    #
    # The relabeling allows the actual service scrape endpoint to be configured
    # via the following annotations:
    #
    # * `prometheus.io/scrape`: Only scrape services that have a value of
    # `true`, except if `prometheus.io/scrape-slow` is set to `true` as well.
    # * `prometheus.io/scheme`: If the metrics endpoint is secured then you will need
    # to set this to `https` & most likely set the `tls_config` of the scrape config.
    # * `prometheus.io/path`: If the metrics path is not `/metrics` override this.
    # * `prometheus.io/port`: If the metrics are exposed on a different port to the
    # service then set this appropriately.
    # * `prometheus.io/param_<parameter>`: If the metrics endpoint uses parameters
    # then you can set any parameter
    - job_name: 'kubernetes-service-endpoints'
      honor_labels: true

      kubernetes_sd_configs:
        - role: endpoints

      relabel_configs:
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape_slow]
          action: drop
          regex: true
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
          action: replace
          target_label: __scheme__
          regex: (https?)
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
          action: replace
          target_label: __address__
          regex: (.+?)(?::\d+)?;(\d+)
          replacement: $1:$2
        - action: labelmap
          regex: __meta_kubernetes_service_annotation_prometheus_io_param_(.+)
          replacement: __param_$1
        - action: labelmap
          regex: __meta_kubernetes_service_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: namespace
        - source_labels: [__meta_kubernetes_service_name]
          action: replace
          target_label: service
        - source_labels: [__meta_kubernetes_pod_node_name]
          action: replace
          target_label: node

    # -- Slow-scrape service endpoints job with 5-minute intervals for expensive metrics endpoints
    # Scrape config for slow service endpoints; same as above, but with a larger
    # timeout and a larger interval
    #
    # The relabeling allows the actual service scrape endpoint to be configured
    # via the following annotations:
    #
    # * `prometheus.io/scrape-slow`: Only scrape services that have a value of `true`
    # * `prometheus.io/scheme`: If the metrics endpoint is secured then you will need
    # to set this to `https` & most likely set the `tls_config` of the scrape config.
    # * `prometheus.io/path`: If the metrics path is not `/metrics` override this.
    # * `prometheus.io/port`: If the metrics are exposed on a different port to the
    # service then set this appropriately.
    # * `prometheus.io/param_<parameter>`: If the metrics endpoint uses parameters
    # then you can set any parameter
    - job_name: 'kubernetes-service-endpoints-slow'
      honor_labels: true

      scrape_interval: 5m
      scrape_timeout: 30s

      kubernetes_sd_configs:
        - role: endpoints

      relabel_configs:
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape_slow]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scheme]
          action: replace
          target_label: __scheme__
          regex: (https?)
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
          action: replace
          target_label: __address__
          regex: (.+?)(?::\d+)?;(\d+)
          replacement: $1:$2
        - action: labelmap
          regex: __meta_kubernetes_service_annotation_prometheus_io_param_(.+)
          replacement: __param_$1
        - action: labelmap
          regex: __meta_kubernetes_service_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: namespace
        - source_labels: [__meta_kubernetes_service_name]
          action: replace
          target_label: service
        - source_labels: [__meta_kubernetes_pod_node_name]
          action: replace
          target_label: node

    # -- PushGateway service discovery and scraping for ephemeral jobs and batch workloads
    - job_name: 'prometheus-pushgateway'
      honor_labels: true

      kubernetes_sd_configs:
        - role: service

      relabel_configs:
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_probe]
          action: keep
          regex: pushgateway

    # -- Blackbox exporter probe configuration for synthetic monitoring of HTTP/HTTPS/TCP/DNS endpoints
    # Example scrape config for probing services via the Blackbox Exporter.
    #
    # The relabeling allows the actual service scrape endpoint to be configured
    # via the following annotations:
    #
    # * `prometheus.io/probe`: Only probe services that have a value of `true`
    - job_name: 'kubernetes-services'
      honor_labels: true

      metrics_path: /probe
      params:
        module: [http_2xx]

      kubernetes_sd_configs:
        - role: service

      relabel_configs:
        - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_probe]
          action: keep
          regex: true
        - source_labels: [__address__]
          target_label: __param_target
        - target_label: __address__
          replacement: blackbox
        - source_labels: [__param_target]
          target_label: instance
        - action: labelmap
          regex: __meta_kubernetes_service_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_service_name]
          target_label: service

    # -- Pod-based metrics scraping job discovering and scraping pods annotated with prometheus.io labels
    # Example scrape config for pods
    #
    # The relabeling allows the actual pod scrape endpoint to be configured via the
    # following annotations:
    #
    # * `prometheus.io/scrape`: Only scrape pods that have a value of `true`,
    # except if `prometheus.io/scrape-slow` is set to `true` as well.
    # * `prometheus.io/scheme`: If the metrics endpoint is secured then you will need
    # to set this to `https` & most likely set the `tls_config` of the scrape config.
    # * `prometheus.io/path`: If the metrics path is not `/metrics` override this.
    # * `prometheus.io/port`: Scrape the pod on the indicated port instead of the default of `9102`.
    - job_name: 'kubernetes-pods'
      honor_labels: true

      kubernetes_sd_configs:
        - role: pod

      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape_slow]
          action: drop
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
          action: replace
          regex: (https?)
          target_label: __scheme__
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
          action: replace
          regex: (\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})
          replacement: '[$2]:$1'
          target_label: __address__
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
          action: replace
          regex: (\d+);((([0-9]+?)(\.|$)){4})
          replacement: $2:$1
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)
          replacement: __param_$1
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: pod
        - source_labels: [__meta_kubernetes_pod_phase]
          regex: Pending|Succeeded|Failed|Completed
          action: drop
        - source_labels: [__meta_kubernetes_pod_node_name]
          action: replace
          target_label: node

    # -- Slow-interval pod metrics scraping for expensive metrics endpoints (5-minute scrape interval with 30s timeout)
    # Example Scrape config for pods which should be scraped slower. An useful example
    # would be stackriver-exporter which queries an API on every scrape of the pod
    #
    # The relabeling allows the actual pod scrape endpoint to be configured via the
    # following annotations:
    #
    # * `prometheus.io/scrape-slow`: Only scrape pods that have a value of `true`
    # * `prometheus.io/scheme`: If the metrics endpoint is secured then you will need
    # to set this to `https` & most likely set the `tls_config` of the scrape config.
    # * `prometheus.io/path`: If the metrics path is not `/metrics` override this.
    # * `prometheus.io/port`: Scrape the pod on the indicated port instead of the default of `9102`.
    - job_name: 'kubernetes-pods-slow'
      honor_labels: true

      scrape_interval: 5m
      scrape_timeout: 30s

      kubernetes_sd_configs:
        - role: pod

      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape_slow]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
          action: replace
          regex: (https?)
          target_label: __scheme__
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
          action: replace
          regex: (\d+);(([A-Fa-f0-9]{1,4}::?){1,7}[A-Fa-f0-9]{1,4})
          replacement: '[$2]:$1'
          target_label: __address__
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
          action: replace
          regex: (\d+);((([0-9]+?)(\.|$)){4})
          replacement: $2:$1
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_annotation_prometheus_io_param_(.+)
          replacement: __param_$1
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: pod
        - source_labels: [__meta_kubernetes_pod_phase]
          regex: Pending|Succeeded|Failed|Completed
          action: drop
        - source_labels: [__meta_kubernetes_pod_node_name]
          action: replace
          target_label: node

# -- Prometheus PVE Exporter configuration for Proxmox Virtual Environment metrics collection
pveExporter:

  # -- Container image settings for the Proxmox VE exporter component
  image:
    # -- OCI image repository for the Proxmox VE Prometheus exporter
    repository: prompve/prometheus-pve-exporter
    # -- Specific version of the PVE exporter to use (version-specific for compatibility)
    tag: "3.5.2"

  # -- Number of exporter pod replicas for high availability and load distribution
  replicaCount: 1

  # -- Number of previous ReplicaSets to retain for rollback capability
  revisionHistoryLimit: 10

  # -- Kubernetes ServiceAccount configuration for RBAC and pod identity
  serviceAccount:
    # -- Create a dedicated ServiceAccount for the PVE exporter component
    create: true

  # -- Container-level security context enforcing least-privilege execution
  securityContext:
    # -- Drop all Linux kernel capabilities then explicitly add only necessary ones
    capabilities:
      drop:
      - ALL
    # -- Mount container root filesystem as read-only for immutability and reduced attack surface
    readOnlyRootFilesystem: true
    # -- Require the container to run as non-root user for privilege isolation
    runAsNonRoot: true
    # -- UID for running the exporter process (65534 is the 'nobody' user)
    runAsUser: 65534

  # -- Resource constraints for the PVE exporter container
  resources: {}
    # -- Uncomment and adjust to set explicit resource limits and requests
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # -- Environment variables configuring Proxmox VE API connection
  env:
    # -- Proxmox VE API user for authentication (format: username@pam or username@pve)
    pveUser: "prometheus@pve"
    # -- Reference to existing Kubernetes Secret containing PVE authentication credentials
    # If provided, no additional secret will be created. Secret must contain password OR tokenName and tokenValue fields
    pveExistingSecretName: "prometheus-pve-exporter"
    # -- Enable or disable SSL/TLS certificate verification for Proxmox API (set to false for self-signed certs)
    pveVerifySsl: false
