apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ghostfolio.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ghostfolio.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ghostfolio.replicas }}
  selector:
    matchLabels:
      {{- include "ghostfolio.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ghostfolio.selectorLabels" . | nindent 8 }}
      annotations:
        # No checksum annotation for secrets to avoid ArgoCD drift
        # Secrets are externally managed and referenced by name
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.ghostfolio.podSecurityContext | nindent 8 }}
      containers:
        - name: ghostfolio
          image: "{{ .Values.ghostfolio.image.repository }}:{{ .Values.ghostfolio.image.tag }}"
          imagePullPolicy: {{ .Values.ghostfolio.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.ghostfolio.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.ghostfolio.port }}
              protocol: TCP
          env:
            # Database URL from secret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ghostfolio.database.secretName }}
                  key: {{ .Values.ghostfolio.database.secretKey }}
            # Redis configuration
            - name: REDIS_HOST
              value: {{ include "ghostfolio.redis.host" . | quote }}
            - name: REDIS_PORT
              value: {{ .Values.ghostfolio.redis.port | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ghostfolio.redis.passwordSecretName }}
                  key: {{ .Values.ghostfolio.redis.passwordSecretKey }}
            # Application secrets
            - name: ACCESS_TOKEN_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ghostfolio.secretName }}
                  key: ACCESS_TOKEN_SALT
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ghostfolio.secretName }}
                  key: JWT_SECRET_KEY
          {{- if .Values.ghostfolio.livenessProbe.enabled }}
          livenessProbe:
            {{- with .Values.ghostfolio.livenessProbe.httpGet }}
            httpGet:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            initialDelaySeconds: {{ .Values.ghostfolio.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.ghostfolio.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.ghostfolio.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.ghostfolio.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.ghostfolio.readinessProbe.enabled }}
          readinessProbe:
            {{- with .Values.ghostfolio.readinessProbe.httpGet }}
            httpGet:
              {{- toYaml . | nindent 14 }}
            {{- end }}
            initialDelaySeconds: {{ .Values.ghostfolio.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.ghostfolio.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.ghostfolio.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.ghostfolio.readinessProbe.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.ghostfolio.resources | nindent 12 }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
