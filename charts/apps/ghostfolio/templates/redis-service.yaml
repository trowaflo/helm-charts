{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ghostfolio.fullname" . }}-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ghostfolio.redis.labels" . | nindent 4 }}
spec:
  type: {{ .Values.redis.service.type }}
  clusterIP: None
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "ghostfolio.redis.selectorLabels" . | nindent 4 }}
{{- end }}
