{{- if .Values.postgresql.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "ghostfolio.fullname" . }}-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ghostfolio.postgresql.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.postgresql.cluster.instances }}

  imageName: {{ .Values.postgresql.cluster.imageName }}

  # Storage configuration
  storage:
    {{- if .Values.postgresql.cluster.storage.storageClass }}
    storageClass: {{ .Values.postgresql.cluster.storage.storageClass }}
    {{- end }}
    size: {{ .Values.postgresql.cluster.storage.size }}

  # Bootstrap with initdb and external secret
  bootstrap:
    initdb:
      database: {{ .Values.postgresql.cluster.bootstrap.initdb.database }}
      owner: {{ .Values.postgresql.cluster.bootstrap.initdb.owner }}
      secret:
        name: {{ .Values.postgresql.cluster.bootstrap.initdb.secret.name }}

  # PostgreSQL configuration
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      maintenance_work_mem: "64MB"
      checkpoint_completion_target: "0.9"
      wal_buffers: "16MB"
      default_statistics_target: "100"
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      work_mem: "2621kB"
      min_wal_size: "1GB"
      max_wal_size: "4GB"

  # Resources
  resources:
    {{- toYaml .Values.postgresql.cluster.resources | nindent 4 }}

  {{- if .Values.postgresql.cluster.monitoring.enabled }}
  # Monitoring
  monitoring:
    enablePodMonitor: {{ .Values.postgresql.cluster.monitoring.podMonitorEnabled }}
  {{- end }}

  {{- if .Values.postgresql.cluster.backup.enabled }}
  # Backup configuration
  backup:
    {{- if .Values.postgresql.cluster.backup.barmanObjectStore }}
    barmanObjectStore:
      {{- toYaml .Values.postgresql.cluster.backup.barmanObjectStore | nindent 6 }}
    {{- end }}
    retentionPolicy: "30d"
  {{- end }}

  # Affinity
  {{- with .Values.global.affinity }}
  affinity:
    {{- toYaml . | nindent 4 }}
  {{- end }}

  # Node selector
  {{- with .Values.global.nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
