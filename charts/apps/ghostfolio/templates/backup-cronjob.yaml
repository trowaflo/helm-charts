{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "ghostfolio.fullname" . }}-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ghostfolio.backup.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "ghostfolio.backup.selectorLabels" . | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          {{- with .Values.global.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.backup.podSecurityContext | nindent 12 }}
          containers:
            - name: backup
              image: "{{ .Values.backup.image.repository }}:{{ .Values.backup.image.tag }}"
              imagePullPolicy: {{ .Values.backup.image.pullPolicy }}
              securityContext:
                {{- toYaml .Values.backup.securityContext | nindent 16 }}
              command:
                - /bin/bash
                - -c
                - |
                  set -e

                  # Generate backup filename with timestamp
                  BACKUP_FILE="/backup/ghostfolio-$(date +%Y-%m-%d-%H%M%S).dump"

                  echo "Starting backup to $BACKUP_FILE"

                  # Perform pg_dump with custom format
                  pg_dump -Fc -v -f "$BACKUP_FILE" "$DATABASE_URL"

                  echo "Backup completed: $BACKUP_FILE"

                  # Verify backup integrity
                  echo "Verifying backup integrity..."
                  pg_restore --list "$BACKUP_FILE" > /dev/null
                  echo "Backup verification successful"

                  # Cleanup old backups (keep last N)
                  echo "Cleaning up old backups (keeping last {{ .Values.backup.retention }})"
                  cd /backup
                  ls -t ghostfolio-*.dump | tail -n +{{ add1 .Values.backup.retention }} | xargs -r rm -f

                  echo "Backup process completed successfully"
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.ghostfolio.database.secretName }}
                      key: {{ .Values.ghostfolio.database.secretKey }}
              volumeMounts:
                - name: backup
                  mountPath: /backup
              resources:
                {{- toYaml .Values.backup.resources | nindent 16 }}
          volumes:
            - name: backup
              nfs:
                server: {{ .Values.backup.nfs.server | quote }}
                path: {{ .Values.backup.nfs.path | quote }}
          {{- with .Values.global.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.global.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
