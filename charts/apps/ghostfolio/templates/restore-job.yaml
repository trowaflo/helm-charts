{{- if .Values.restore.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ghostfolio.fullname" . }}-restore-{{ now | date "20060102-150405" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ghostfolio.restore.labels" . | nindent 4 }}
spec:
  ttlSecondsAfterFinished: 86400  # Cleanup after 24 hours
  template:
    metadata:
      labels:
        {{- include "ghostfolio.restore.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.restore.podSecurityContext | nindent 8 }}
      containers:
        - name: restore
          image: "{{ .Values.restore.image.repository }}:{{ .Values.restore.image.tag }}"
          imagePullPolicy: {{ .Values.restore.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.restore.securityContext | nindent 12 }}
          command:
            - /bin/bash
            - -c
            - |
              set -e

              RESTORE_FILE="/backup/{{ .Values.restore.restoreFile }}"

              if [ ! -f "$RESTORE_FILE" ]; then
                echo "ERROR: Restore file not found: $RESTORE_FILE"
                exit 1
              fi

              echo "Starting restore from $RESTORE_FILE"

              # Verify backup file integrity
              echo "Verifying backup file integrity..."
              pg_restore --list "$RESTORE_FILE" > /dev/null
              echo "Backup file verification successful"

              # Perform restore
              # Note: This assumes the database exists and will clean it first
              # Use --clean to drop objects before recreating them
              echo "Restoring database..."
              pg_restore -v --clean --if-exists -d "$DATABASE_URL" "$RESTORE_FILE" || true

              echo "Restore process completed"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ghostfolio.database.secretName }}
                  key: {{ .Values.ghostfolio.database.secretKey }}
          volumeMounts:
            - name: backup
              mountPath: /backup
              readOnly: true
          resources:
            {{- toYaml .Values.restore.resources | nindent 12 }}
      volumes:
        - name: backup
          nfs:
            server: {{ .Values.restore.nfs.server | quote }}
            path: {{ .Values.restore.nfs.path | quote }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
