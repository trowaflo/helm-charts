apiVersion: v2
name: ghostfolio
version: 15.0.0
type: application
description: |-
  Privacy-first open source portfolio tracker with PostgreSQL (CNPG) and Valkey (Redis).
  Includes automated backup to NFS and manual restore capabilities.
keywords:
  - ghostfolio
  - portfolio
  - finance
  - tracker
  - postgresql
  - redis
  - cnpg
  - backup
home: https://ghostfol.io
icon: https://raw.githubusercontent.com/ghostfolio/ghostfolio/main/apps/client/src/favicon.svg
maintainers:
  - name: trowaflo
    email: trowa.flo@gmail.com
sources:
  - https://github.com/ghostfolio/ghostfolio
  - https://github.com/trowaflo/helm-charts

dependencies:
  - name: common
    version: 5.0.0
    repository: file://../../library/common
  - name: valkey
    version: 0.9.4
    repository: https://valkey.io/valkey-helm/
    condition: valkey.enabled
