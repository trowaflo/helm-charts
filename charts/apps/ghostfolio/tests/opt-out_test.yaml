suite: test ghostfolio chart - Secret opt-out (existingSecret)
templates:
  - templates/common.yaml
release:
  name: ghostfolio-test
  namespace: ghostfolio-test
tests:
  - it: should not render any Secret when existingSecret is set for all
    set:
      secrets:
        auth:
          existingSecret: ext-auth
        redis:
          existingSecret: ext-redis
        db-bootstrap:
          existingSecret: ext-db
    asserts:
      - hasDocuments:
          count: 5

  - it: should not render redis Secret when secrets.redis.existingSecret is set
    set:
      secrets:
        redis:
          existingSecret: ext-redis
    asserts:
      - hasDocuments:
          count: 7
      - documentIndex: 1
        equal:
          path: metadata.name
          value: ghostfolio-test-auth
      - documentIndex: 2
        equal:
          path: metadata.name
          value: ghostfolio-test-db-bootstrap

  - it: should render all three Secrets with auto-generated names by default
    asserts:
      - hasDocuments:
          count: 8
      # index 0 = CNPG Cluster; Secrets sorted alpha: auth(1) db-bootstrap(2) redis(3)
      - documentIndex: 1
        equal:
          path: metadata.name
          value: ghostfolio-test-auth
      - documentIndex: 2
        equal:
          path: metadata.name
          value: ghostfolio-test-db-bootstrap
      - documentIndex: 3
        equal:
          path: metadata.name
          value: ghostfolio-test-redis
      - documentIndex: 1
        equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
      - documentIndex: 2
        equal:
          path: type
          value: kubernetes.io/basic-auth
