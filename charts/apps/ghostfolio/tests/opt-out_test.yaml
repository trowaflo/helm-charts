suite: test ghostfolio chart - Secret opt-out (existingSecret)
templates:
  - templates/common.yaml
values:
  - values/all-enabled.yaml
release:
  name: ghostfolio-test
  namespace: ghostfolio-test
tests:
  - it: should render ghostfolio-secrets Secret by default
    documentSelector:
      path: metadata.name
      value: ghostfolio-test-ghostfolio-secrets
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: ghostfolio-test-ghostfolio-secrets
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep

  - it: should render db-bootstrap Secret by default
    documentSelector:
      path: metadata.name
      value: ghostfolio-test-db-bootstrap
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: ghostfolio-test-db-bootstrap
      - equal:
          path: stringData.username
          value: ghostfolio

  - it: should not render Secret when existingSecret is set
    set:
      secrets:
        ghostfolio-secrets:
          existingSecret: ext-ghostfolio
    documentSelector:
      path: kind
      value: CronJob
    asserts:
      - isKind:
          of: CronJob
