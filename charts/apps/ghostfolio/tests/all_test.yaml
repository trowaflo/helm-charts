suite: test ghostfolio chart - All resources
templates:
  - templates/common.yaml
values:
  - values/all-enabled.yaml
release:
  name: ghostfolio-test
  namespace: ghostfolio-test
tests:
  - it: should render Deployment
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - isKind:
          of: Deployment

  - it: should render main Service
    documentSelector:
      path: spec.ports[0].name
      value: http
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: ghostfolio-test-main

  - it: should have correct app labels
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: ghostfolio
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: ghostfolio-test
