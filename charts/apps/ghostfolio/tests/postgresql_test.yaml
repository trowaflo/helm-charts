# Test Coverage Documentation
# ============================
# This test suite validates the Ghostfolio PostgreSQL CNPG Cluster rendering.
#
# Covered Test Cases:
# - [x] CNPG Cluster creation when enabled
# - [x] CNPG Cluster not created when disabled
# - [x] Metadata (name, namespace) correctness
# - [x] Instance count configuration
# - [x] Bootstrap initdb configuration (database, owner, secret)
# - [x] Snapshot validation
# - [x] Storage class configuration (tested via common library CNPG tests)
# - [x] Backup configuration (tested via common library CNPG tests)
# - [x] Resource requests and limits (tested via common library CNPG tests)
# - [x] PostgreSQL parameters tuning (tested via common library CNPG tests)
# - [x] Monitoring configuration (tested via common library CNPG tests)
#
# Note: Ghostfolio uses the common library chart. Feature-level CNPG tests are in
# tests/common-test/tests/cnpg-cluster_test.yaml. These tests validate Ghostfolio-specific
# PostgreSQL integration and configuration.
#
# All applicable test cases now covered!
# ============================

suite: test ghostfolio chart - PostgreSQL
templates:
  - templates/common.yaml
values:
  - values/all-enabled.yaml
release:
  name: ghostfolio-test
  namespace: ghostfolio-test
documentSelector:
  path: kind
  value: Cluster
tests:
  - it: should create CNPG Cluster when enabled
    asserts:
      - isKind:
          of: Cluster
      - equal:
          path: metadata.name
          value: ghostfolio-test-postgresql
      - equal:
          path: spec.instances
          value: 1

  - it: should not create PostgreSQL when disabled
    set:
      postgresql.enabled: false
    documentSelector:
      path: kind
      value: Cluster
    asserts:
      - hasDocuments:
          count: 0

  - it: should have correct bootstrap configuration
    asserts:
      - equal:
          path: spec.bootstrap.initdb.database
          value: ghostfolio
      - equal:
          path: spec.bootstrap.initdb.owner
          value: ghostfolio
      - equal:
          path: spec.bootstrap.initdb.secret.name
          value: test-db-app-secret

  - it: should match snapshot
    asserts:
      - matchSnapshot: {}
