# Test Coverage Documentation
# ============================
# This test suite validates the Ghostfolio PostgreSQL CNPG Cluster rendering.
#
# Covered Test Cases:
# - [x] CNPG Cluster creation when enabled
# - [x] CNPG Cluster not created when disabled
# - [x] Metadata (name, namespace) correctness
# - [x] Instance count configuration
# - [x] Bootstrap initdb configuration (database, owner, secret)
# - [x] Snapshot validation
#
# Not Covered (Future):
# - [ ] Storage class configuration
# - [ ] Backup configuration
# - [ ] Resource requests and limits
# - [ ] PostgreSQL parameters tuning
# - [ ] Monitoring configuration
# ============================

suite: test ghostfolio chart - PostgreSQL
templates:
  - templates/postgresql-cluster.yaml
values:
  - values/all-enabled.yaml
release:
  name: ghostfolio-test
  namespace: ghostfolio-test
tests:
  - it: should create CNPG Cluster when enabled
    template: templates/postgresql-cluster.yaml
    asserts:
      - isKind:
          of: Cluster
      - equal:
          path: metadata.name
          value: ghostfolio-test-postgresql
      - equal:
          path: spec.instances
          value: 1

  - it: should not create PostgreSQL when disabled
    template: templates/postgresql-cluster.yaml
    set:
      postgresql.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should have correct bootstrap configuration
    template: templates/postgresql-cluster.yaml
    asserts:
      - equal:
          path: spec.bootstrap.initdb.database
          value: ghostfolio
      - equal:
          path: spec.bootstrap.initdb.owner
          value: ghostfolio
      - equal:
          path: spec.bootstrap.initdb.secret.name
          value: test-db-app-secret

  - it: should match snapshot
    template: templates/postgresql-cluster.yaml
    asserts:
      - matchSnapshot: {}
