redis:
  enabled: true

postgresql:
  enabled: true
  cluster:
    bootstrap:
      initdb:
        secret:
          name: test-db-app-secret

backup:
  enabled: true
  nfs:
    server: "192.168.1.100"
    path: "/mnt/backups"

restore:
  enabled: false
