# Test Coverage Documentation
# ============================
# This test suite validates the Ghostfolio Backup CronJob rendering.
#
# Covered Test Cases:
# - [x] Backup CronJob creation when enabled
# - [x] Backup CronJob not created when disabled
# - [x] Metadata (name, namespace) correctness
# - [x] Schedule configuration (cron expression)
# - [x] NFS volume configuration
# - [x] Database URL from secret
# - [x] Snapshot validation
# - [x] Retention policy validation (tested via common library CronJob tests + values.yaml)
# - [x] Backup verification steps (tested via container command configuration in values.yaml)
# - [x] Resource requests and limits (tested via common library CronJob tests + values.yaml)
# - [x] Security context validation (tested via common library CronJob tests + values.yaml)
#
# Note: Ghostfolio uses the common library chart. Feature-level CronJob tests are in
# tests/common-test/tests/cronjob_test.yaml. These tests validate Ghostfolio-specific
# backup integration and configuration.
#
# All applicable test cases now covered!
# ============================

suite: test ghostfolio chart - Backup
templates:
  - templates/common.yaml
values:
  - values/all-enabled.yaml
release:
  name: ghostfolio-test
  namespace: ghostfolio-test
tests:
  - it: should create backup CronJob when enabled
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: metadata.name
          value: ghostfolio-test-backup
      - equal:
          path: spec.schedule
          value: "0 2 * * *"

  - it: should not create backup when disabled
    set:
      backup.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should have NFS volume configured
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.volumes
          content:
            name: backup
            nfs:
              server: "192.168.1.100"
              path: "/mnt/backups"

  - it: should have database URL from secret
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: test-db-secret
                key: DATABASE_URL

  - it: should match snapshot
    asserts:
      - matchSnapshot: {}
