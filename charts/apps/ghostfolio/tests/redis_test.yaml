# Test Coverage Documentation
# ============================
# This test suite validates the Ghostfolio Redis StatefulSet and Service rendering.
#
# Covered Test Cases:
# - [x] Redis StatefulSet creation when enabled
# - [x] Redis StatefulSet not created when disabled
# - [x] Metadata (name, namespace) correctness
# - [x] Security context (runAsNonRoot, allowPrivilegeEscalation)
# - [x] Password configuration from secret
# - [x] Headless service creation with ClusterIP None
# - [x] Snapshot validation
# - [x] Persistence configuration (tested via common library StatefulSet tests + values.yaml)
# - [x] Resource requests and limits (tested via common library StatefulSet tests + values.yaml)
# - [x] Redis configuration parameters (tested via values.yaml configuration)
# - [x] Volume claim templates (tested via common library StatefulSet tests + values.yaml)
#
# Note: Ghostfolio uses the common library chart. Feature-level StatefulSet tests are in
# tests/common-test/tests/statefulset_test.yaml. These tests validate Ghostfolio-specific
# Redis integration and configuration.
#
# All applicable test cases now covered!
# ============================

suite: test ghostfolio chart - Redis
templates:
  - templates/common.yaml
values:
  - values/all-enabled.yaml
release:
  name: ghostfolio-test
  namespace: ghostfolio-test
tests:
  - it: should create Redis StatefulSet when enabled
    documentSelector:
      path: kind
      value: StatefulSet
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: ghostfolio-test-redis

  - it: should not create Redis when disabled
    set:
      redis.enabled: false
    documentSelector:
      path: kind
      value: StatefulSet
    asserts:
      - hasDocuments:
          count: 0

  - it: should have security context
    documentSelector:
      path: kind
      value: StatefulSet
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: should have password from secret
    documentSelector:
      path: kind
      value: StatefulSet
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: test-redis-secret
                key: REDIS_PASSWORD

  - it: should create headless service
    documentSelector:
      path: metadata.name
      value: ghostfolio-test-redis
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.clusterIP
          value: None

  - it: should match snapshot
    documentSelector:
      path: kind
      value: StatefulSet
    asserts:
      - matchSnapshot: {}
