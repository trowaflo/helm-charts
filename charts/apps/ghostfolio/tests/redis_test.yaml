# Test Coverage Documentation
# ============================
# This test suite validates the Ghostfolio Redis integration.
#
# Covered Test Cases:
# - [x] Deployment has REDIS_HOST env pointing to valkey service
# - [x] Deployment has REDIS_PASSWORD from secret
# - [x] Deployment has REDIS_PORT configured
#
# Note: Redis is provided by the valkey subchart dependency (condition: redis.enabled).
# We only test integration points (env vars) since the subchart is tested upstream.
# ============================

suite: test ghostfolio chart - Redis integration
templates:
  - templates/common.yaml
values:
  - values/all-enabled.yaml
release:
  name: ghostfolio-test
  namespace: ghostfolio-test
tests:
  - it: should have REDIS_HOST env pointing to valkey service
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_HOST
            value: ghostfolio-test-redis

  - it: should have REDIS_PASSWORD from secret
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: ghostfolio-test-redis
                key: REDIS_PASSWORD

  - it: should have REDIS_PORT configured
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PORT
            value: "6379"
