# Test Coverage Documentation
# ============================
# This test suite validates the Ghostfolio Deployment rendering.
#
# Covered Test Cases:
# - [x] Deployment resource creation
# - [x] Metadata (name, namespace) correctness
# - [x] Replica count configuration
# - [x] Environment variables (DATABASE_URL, ACCESS_TOKEN_SALT)
# - [x] Security context (runAsNonRoot, allowPrivilegeEscalation)
# - [x] Health probes (liveness and readiness)
# - [x] Snapshot validation
#
# Note: Ghostfolio uses the common library chart. Feature-level tests are in
# tests/common-test/. These tests validate Ghostfolio-specific integration.
# ============================

suite: test ghostfolio chart - Deployment
templates:
  - templates/common.yaml
values:
  - values/all-enabled.yaml
release:
  name: ghostfolio-test
  namespace: ghostfolio-test
tests:
  - it: should create a Deployment
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: ghostfolio-test-main
      - equal:
          path: spec.replicas
          value: 1

  - it: should have correct environment variables
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: ghostfolio-test-postgresql-app
                key: uri
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ACCESS_TOKEN_SALT
            valueFrom:
              secretKeyRef:
                name: ghostfolio-test-secrets
                key: ACCESS_TOKEN_SALT

  - it: should have security context
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: should have probes enabled
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should match snapshot
    documentSelector:
      path: kind
      value: Deployment
    asserts:
      - matchSnapshot: {}
