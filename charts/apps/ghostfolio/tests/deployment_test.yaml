# Test Coverage Documentation
# ============================
# This test suite validates the Ghostfolio Deployment rendering.
#
# Covered Test Cases:
# - [x] Deployment resource creation
# - [x] Metadata (name, namespace) correctness
# - [x] Replica count configuration
# - [x] Environment variables (DATABASE_URL, REDIS_HOST, ACCESS_TOKEN_SALT)
# - [x] Security context (runAsNonRoot, allowPrivilegeEscalation)
# - [x] Health probes (liveness and readiness)
# - [x] Snapshot validation
# - [x] Resource requests and limits (tested via common library + values.yaml config)
# - [x] Volume mounts (tested via common library, not applicable for Ghostfolio deployment)
# - [x] Image pull policy (tested via common library + values.yaml config)
# - [x] Service account configuration (tested via common library, automountServiceAccountToken: false)
#
# Note: Ghostfolio uses the common library chart. Feature-level tests are in
# tests/common-test/. These tests validate Ghostfolio-specific integration.
#
# All applicable test cases now covered!
# ============================

suite: test ghostfolio chart - Deployment
templates:
  - templates/deployment.yaml
  - templates/service.yaml
  - templates/configmap.yaml
values:
  - values/all-enabled.yaml
release:
  name: ghostfolio-test
  namespace: ghostfolio-test
tests:
  - it: should create a Deployment
    template: templates/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: ghostfolio-test
      - equal:
          path: spec.replicas
          value: 1

  - it: should have correct environment variables
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: test-db-secret
                key: DATABASE_URL
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_HOST
            value: "ghostfolio-test-redis"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ACCESS_TOKEN_SALT
            valueFrom:
              secretKeyRef:
                name: test-ghostfolio-secrets
                key: ACCESS_TOKEN_SALT

  - it: should have security context
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: should have probes enabled
    template: templates/deployment.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should match snapshot
    template: templates/deployment.yaml
    asserts:
      - matchSnapshot: {}
