suite: test ghostfolio chart - Deployment
templates:
  - templates/deployment.yaml
  - templates/service.yaml
  - templates/configmap.yaml
values:
  - values/all-enabled.yaml
release:
  name: ghostfolio-test
  namespace: ghostfolio-test
tests:
  - it: should create a Deployment
    template: templates/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: ghostfolio-test
      - equal:
          path: spec.replicas
          value: 1

  - it: should have correct environment variables
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: test-db-secret
                key: DATABASE_URL
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_HOST
            value: "ghostfolio-test-redis"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: ACCESS_TOKEN_SALT
            valueFrom:
              secretKeyRef:
                name: test-ghostfolio-secrets
                key: ACCESS_TOKEN_SALT

  - it: should have security context
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false

  - it: should have probes enabled
    template: templates/deployment.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should match snapshot
    template: templates/deployment.yaml
    asserts:
      - matchSnapshot: {}
