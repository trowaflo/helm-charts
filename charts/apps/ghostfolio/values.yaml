---
# Ghostfolio facade: secret handling and CNPG bootstrap knobs.
ghostfolio:
  auth:
    # If set, chart skips auto-generation of <release>-ghostfolio-secrets and
    # expects the named Secret to exist with keys ACCESS_TOKEN_SALT + JWT_SECRET_KEY.
    existingSecret: ""
  redis:
    auth:
      # If set, chart skips auto-generation of <release>-ghostfolio-redis and
      # expects the named Secret to exist with key REDIS_PASSWORD.
      existingSecret: ""
  database:
    bootstrap:
      # If set, chart skips auto-generation of <release>-ghostfolio-db-bootstrap and
      # expects the named Secret to exist with keys username + password (kubernetes.io/basic-auth).
      existingSecret: ""
      # Seed username for auto-generated bootstrap secret (ignored when existingSecret is set).
      username: ghostfolio

# Main deployment
deployments:
  main:
    enabled: true
    replicas: 1
    revisionHistoryLimit: 3
    strategy:
      type: Recreate

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

    containers:
      main:
        image:
          repository: ghostfolio/ghostfolio
          tag: 2.167.0
          pullPolicy: IfNotPresent

        ports:
          http:
            containerPort: 3333
            protocol: TCP

        env:
          NODE_ENV: production
          REDIS_HOST: '{{ include "common.helpers.fullname" . }}-redis'
          REDIS_PORT: "6379"
          DATABASE_URL:
            secretKeyRef:
              name: '{{ include "common.helpers.cnpgAppSecret" (dict "root" . "name" "postgresql") }}'
              key: uri
          REDIS_PASSWORD:
            secretKeyRef:
              name: '{{ include "ghostfolio.secretName.redis" . }}'
              key: REDIS_PASSWORD
          ACCESS_TOKEN_SALT:
            secretKeyRef:
              name: '{{ include "ghostfolio.secretName.auth" . }}'
              key: ACCESS_TOKEN_SALT
          JWT_SECRET_KEY:
            secretKeyRef:
              name: '{{ include "ghostfolio.secretName.auth" . }}'
              key: JWT_SECRET_KEY

        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1

        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
          successThreshold: 1

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

# Services
k8sServices:
  main:
    enabled: true
    type: ClusterIP
    annotations: {}
    labels: {}
    ports:
      http:
        protocol: TCP
        port: 3333

  redis:
    enabled: true
    type: ClusterIP
    annotations: {}
    labels: {}
    ports:
      redis:
        protocol: TCP
        port: 6379

# Ingress (off by default)
ingresses:
  main:
    enabled: false
    className: ""
    annotations: {}
    hosts:
      - host: ghostfolio.example.com
        paths:
          - path: /
            pathType: Prefix
            service: main
            port: http
    tls: []

# Redis StatefulSet
statefulsets:
  redis:
    enabled: true
    replicas: 1
    revisionHistoryLimit: 3

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999

    containers:
      redis:
        image:
          repository: redis
          tag: 7.4.2-alpine
          pullPolicy: IfNotPresent

        command:
          - redis-server
          - --requirepass
          - $(REDIS_PASSWORD)
          - --appendonly
          - "yes"
          - --dir
          - /data

        ports:
          redis:
            containerPort: 6379
            protocol: TCP

        env:
          REDIS_PASSWORD:
            secretKeyRef:
              name: '{{ include "ghostfolio.secretName.redis" . }}'
              key: REDIS_PASSWORD

        livenessProbe:
          exec:
            command:
              - sh
              - -c
              - redis-cli -a "$REDIS_PASSWORD" ping | grep PONG
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          exec:
            command:
              - sh
              - -c
              - redis-cli -a "$REDIS_PASSWORD" ping | grep PONG
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        volumeMounts:
          - name: data
            mountPath: /data
          - name: tmp
            mountPath: /tmp

        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL

    volumes:
      - name: tmp
        emptyDir: {}

    volumeClaimTemplates:
      - metadata:
          name: data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi

# Backup CronJob (off by default)
cronjobs:
  backup:
    enabled: false
    schedule: "0 2 * * *"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    concurrencyPolicy: Forbid

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999

    containers:
      backup:
        image:
          repository: postgres
          tag: "16"
          pullPolicy: IfNotPresent

        command:
          - /bin/bash
          - -c
          - |
            set -e
            BACKUP_FILE="/backup/ghostfolio-$(date +%Y-%m-%d-%H%M%S).dump"
            echo "Starting backup to $BACKUP_FILE"
            pg_dump -Fc -v -f "$BACKUP_FILE" "$DATABASE_URL"
            echo "Backup completed: $BACKUP_FILE"
            echo "Verifying backup integrity..."
            pg_restore --list "$BACKUP_FILE" > /dev/null
            echo "Backup verification successful"
            echo "Cleaning up old backups (keeping last {{ .Values.backup.retention | default 7 }})"
            cd /backup
            ls -t ghostfolio-*.dump | tail -n +{{ add1 (.Values.backup.retention | default 7) }} | xargs -r rm -f
            echo "Backup process completed successfully"

        env:
          DATABASE_URL:
            secretKeyRef:
              name: '{{ include "common.helpers.cnpgAppSecret" (dict "root" . "name" "postgresql") }}'
              key: uri

        volumeMounts:
          - name: backup
            mountPath: /backup

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL

    volumes:
      - name: backup
        nfs:
          server: ""  # REQUIRED when backup enabled
          path: ""    # REQUIRED when backup enabled

# Restore Job (off by default)
jobs:
  restore:
    enabled: false
    ttlSecondsAfterFinished: 86400
    restartPolicy: OnFailure

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 999
      runAsGroup: 999
      fsGroup: 999

    containers:
      restore:
        image:
          repository: postgres
          tag: "16"
          pullPolicy: IfNotPresent

        command:
          - /bin/bash
          - -c
          - |
            set -e
            RESTORE_FILE="/backup/{{ .Values.restore.restoreFile }}"
            if [ ! -f "$RESTORE_FILE" ]; then
              echo "ERROR: Restore file not found: $RESTORE_FILE"
              exit 1
            fi
            echo "Starting restore from $RESTORE_FILE"
            echo "Verifying backup file integrity..."
            pg_restore --list "$RESTORE_FILE" > /dev/null
            echo "Backup file verification successful"
            echo "Restoring database..."
            pg_restore -v --clean --if-exists -d "$DATABASE_URL" "$RESTORE_FILE" || true
            echo "Restore process completed"

        env:
          DATABASE_URL:
            secretKeyRef:
              name: '{{ include "common.helpers.cnpgAppSecret" (dict "root" . "name" "postgresql") }}'
              key: uri

        volumeMounts:
          - name: backup
            mountPath: /backup
            readOnly: true

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL

    volumes:
      - name: backup
        nfs:
          server: ""  # REQUIRED when restore enabled
          path: ""    # REQUIRED when restore enabled

# Backup tunables
backup:
  retention: 7

# Restore tunables
restore:
  restoreFile: ""

# CNPG PostgreSQL Cluster
cnpgClusters:
  postgresql:
    enabled: true
    instances: 1
    imageName: ghcr.io/cloudnative-pg/postgresql:16.6

    storage:
      storageClass: ""
      size: 10Gi

    bootstrap:
      initdb:
        database: ghostfolio
        owner: ghostfolio
        secret:
          name: '{{ include "ghostfolio.secretName.dbBootstrap" . }}'

    postgresql:
      parameters:
        max_connections: "200"
        shared_buffers: "256MB"
        effective_cache_size: "1GB"
        maintenance_work_mem: "64MB"
        checkpoint_completion_target: "0.9"
        wal_buffers: "16MB"
        default_statistics_target: "100"
        random_page_cost: "1.1"
        effective_io_concurrency: "200"
        work_mem: "2621kB"
        min_wal_size: "1GB"
        max_wal_size: "4GB"

    monitoring:
      enabled: false
      podMonitorEnabled: false

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 1Gi

    backup:
      enabled: false
      retentionPolicy: "30d"

# Global
global:
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
