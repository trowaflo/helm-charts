---
# ─────────────────────────────────────────────────────────────────────────────
# Images — centralised declarations, referenced via imageSelector
# ─────────────────────────────────────────────────────────────────────────────
image:
  repository: ghostfolio/ghostfolio
  tag: 2.255.0@sha256:d3ed46a9a5c82db4457ff919be07f02add26e9f5f116be86793ced9aa422e6d3

redisImage:
  repository: redis
  tag: 8.4.2-alpine@sha256:94dc16bdd00af588f596f01a4e44c1092c31d032e4d00a7537f1269eb0a2aa8e

postgresImage:
  repository: postgres
  tag: 16@sha256:71e27bf60b70bded003791b5573f8b808365613f341df20ffcf0c1ed7bc13ddf

# ─────────────────────────────────────────────────────────────────────────────
# Auto-generated secrets (set existingSecret to bring your own)
# ─────────────────────────────────────────────────────────────────────────────
secrets:
  ghostfolio-secrets:
    enabled: true
    existingSecret: ""
    data:
      ACCESS_TOKEN_SALT: ""
      DATABASE_URL: ""
      JWT_SECRET_KEY: ""

# ─────────────────────────────────────────────────────────────────────────────
# Main deployment
# ─────────────────────────────────────────────────────────────────────────────
deployments:
  main:
    enabled: true
    strategy:
      type: Recreate

    podSpec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        main:
          imageSelector: image

          ports:
            http:
              containerPort: 3333
              protocol: TCP

          env:
            NODE_ENV: production
            REDIS_HOST: '{{ include "common.helpers.fullname" . }}-redis'
            REDIS_PORT: "6379"
            DATABASE_URL:
              secretKeyRef:
                name: 'ghostfolio-secrets'
                key: DATABASE_URL
            REDIS_PASSWORD:
              secretKeyRef:
                name: '{{ include "common.helpers.secretName" (dict "root" . "name" "redis") }}'
                key: REDIS_PASSWORD
            ACCESS_TOKEN_SALT:
              secretKeyRef:
                name: 'ghostfolio-secrets'
                key: ACCESS_TOKEN_SALT
            JWT_SECRET_KEY:
              secretKeyRef:
                name: 'ghostfolio-secrets'
                key: JWT_SECRET_KEY

          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
              scheme: HTTP
            initialDelaySeconds: 30

          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi

# ─────────────────────────────────────────────────────────────────────────────
# Services
# ─────────────────────────────────────────────────────────────────────────────
k8sServices:
  main:
    enabled: true
    type: ClusterIP
    ports:
      http:
        protocol: TCP
        port: 3333

# ─────────────────────────────────────────────────────────────────────────────
# Ingress (off by default)
# ─────────────────────────────────────────────────────────────────────────────
ingresses:
  main:
    enabled: false
    hosts:
      - host: ghostfolio.example.com
        paths:
          - path: /
            pathType: Prefix
            service: main
            port: http
    tls: []

# ─────────────────────────────────────────────────────────────────────────────
# Backup CronJob (off by default)
# ─────────────────────────────────────────────────────────────────────────────
cronjobs:
  backup:
    enabled: false
    schedule: "0 2 * * *"

    podSpec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999

      containers:
        backup:
          imageSelector: postgresImage

          command:
            - /bin/bash
            - -c
            - |
              set -e
              BACKUP_FILE="/backup/ghostfolio-$(date +%Y-%m-%d-%H%M%S).dump"
              echo "Starting backup to $BACKUP_FILE"
              pg_dump -Fc -v -f "$BACKUP_FILE" "$DATABASE_URL"
              echo "Backup completed: $BACKUP_FILE"
              echo "Verifying backup integrity..."
              pg_restore --list "$BACKUP_FILE" > /dev/null
              echo "Backup verification successful"
              echo "Cleaning up old backups (keeping last {{ .Values.backup.retention | default 7 }})"
              cd /backup
              ls -t ghostfolio-*.dump | tail -n +{{ add1 (.Values.backup.retention | default 7) }} | xargs -r rm -f
              echo "Backup process completed successfully"

          env:
            DATABASE_URL:
              secretKeyRef:
                name: '{{ include "common.helpers.cnpgAppSecret" (dict "root" . "name" "postgresql") }}'
                key: uri

          volumeMounts:
            - name: backup
              mountPath: /backup

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          securityContext:
            readOnlyRootFilesystem: false

      volumes:
        - name: backup
          nfs:
            server: ""  # REQUIRED when backup enabled
            path: ""    # REQUIRED when backup enabled

# ─────────────────────────────────────────────────────────────────────────────
# Restore Job (off by default)
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  restore:
    enabled: false
    ttlSecondsAfterFinished: 86400

    podSpec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999

      containers:
        restore:
          imageSelector: postgresImage

          command:
            - /bin/bash
            - -c
            - |
              set -e
              RESTORE_FILE="/backup/{{ .Values.restore.restoreFile }}"
              if [ ! -f "$RESTORE_FILE" ]; then
                echo "ERROR: Restore file not found: $RESTORE_FILE"
                exit 1
              fi
              echo "Starting restore from $RESTORE_FILE"
              echo "Verifying backup file integrity..."
              pg_restore --list "$RESTORE_FILE" > /dev/null
              echo "Backup file verification successful"
              echo "Restoring database..."
              pg_restore -v --clean --if-exists -d "$DATABASE_URL" "$RESTORE_FILE" || true
              echo "Restore process completed"

          env:
            DATABASE_URL:
              secretKeyRef:
                name: '{{ include "common.helpers.cnpgAppSecret" (dict "root" . "name" "postgresql") }}'
                key: uri

          volumeMounts:
            - name: backup
              mountPath: /backup
              readOnly: true

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          securityContext:
            readOnlyRootFilesystem: false

      volumes:
        - name: backup
          nfs:
            server: ""  # REQUIRED when restore enabled
            path: ""    # REQUIRED when restore enabled

# ─────────────────────────────────────────────────────────────────────────────
# Backup tunables
# ─────────────────────────────────────────────────────────────────────────────
backup:
  retention: 7

# Restore tunables
restore:
  restoreFile: ""

# ─────────────────────────────────────────────────────────────────────────────
# CNPG PostgreSQL Cluster
# ─────────────────────────────────────────────────────────────────────────────
cnpgClusters:
  postgresql:
    enabled: true
    instances: 1
    imageName: ghcr.io/cloudnative-pg/postgresql:16.6

    storage:
      storageClass: ""
      size: 10Gi

    bootstrap:
      initdb:
        database: ghostfolio
        owner: ghostfolio
        secret:
          name: '{{ include "common.helpers.secretName" (dict "root" . "name" "db-bootstrap") }}'

    postgresql:
      parameters:
        max_connections: "200"
        shared_buffers: "256MB"
        effective_cache_size: "1GB"
        maintenance_work_mem: "64MB"
        checkpoint_completion_target: "0.9"
        wal_buffers: "16MB"
        default_statistics_target: "100"
        random_page_cost: "1.1"
        effective_io_concurrency: "200"
        work_mem: "2621kB"
        min_wal_size: "1GB"
        max_wal_size: "4GB"

    monitoring:
      enabled: false
      podMonitorEnabled: false

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 2000m
        memory: 1Gi

    backup:
      enabled: false
      retentionPolicy: "30d"

# Global
global:
  imagePullSecrets: []
  nodeSelector: {}
  tolerations: []
  affinity: {}
