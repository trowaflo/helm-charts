suite: test frigate-exporter chart - Deployment
templates:
  - templates/common.yaml
values:
  - values/default.yaml
release:
  name: frigate-exporter-testing
  namespace: frigate-exporter-testing
tests:
  # Snapshot = validates complete coherence with default values
  - it: should match snapshot with default values
    documentIndex: 1
    asserts:
      - matchSnapshot: {}

  # Test app-specific: environment variable templating
  - it: should render FRIGATE_STATS_URL with tpl
    documentIndex: 1
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: "FRIGATE_STATS_URL"
            value: "http://frigate-exporter-testing-name-override-test.frigate-exporter-testing-namespace-override-test.svc.cluster.local:5000/api/stats"
