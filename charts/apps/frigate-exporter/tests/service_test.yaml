suite: test frigate-exporter chart - Service
templates:
  - templates/common.yaml
values:
  - values/default.yaml
release:
  name: frigate-exporter-testing
  namespace: frigate-exporter-testing
tests:
  # Snapshot = validates complete coherence with default values
  - it: should match snapshot with default values
    documentIndex: 0
    asserts:
      - matchSnapshot: {}

  - it: should have correct ports defined
    documentIndex: 0
    asserts:
      # Number of ports defined
      - lengthEqual:
          path: "spec.ports"
          count: 1
      - equal:
          path: "spec.ports[0]"
          value:
            name: "main"
            port: 9100
            protocol: "TCP"
            targetPort: main
