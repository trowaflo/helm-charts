---
deployments:
  main:
    enabled: true
    # Preserve the pre-3.0.0 behaviour (single-replica exporter recreated on update).
    strategy:
      type: Recreate
    podSpec:
      securityContext:
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        main:
          image:
            pullPolicy: IfNotPresent
            repository: rhysbailey/prometheus-frigate-exporter
            tag: 0.1.1@sha256:6df30ca30c5a69df4f3b21c06a93043a52baf523f808de56f4a40982393b8aff

          ports:
            main:
              containerPort: 9100
              protocol: TCP

          livenessProbe:
            httpGet:
              path: /metrics
              port: main
              scheme: HTTP
            initialDelaySeconds: 30

          readinessProbe:
            httpGet:
              path: /metrics
              port: main
              scheme: HTTP
            initialDelaySeconds: 30

          startupProbe:
            httpGet:
              path: /metrics
              port: main
              scheme: HTTP
            initialDelaySeconds: 60

          resources:
            limits:
              cpu: 100m
              memory: 64Mi

            requests:
              cpu: 1m
              memory: 32Mi

          env: []

# Configuration for the Frigate service to monitor
frigate:
  # Name of the Frigate service
  serviceName: frigate
  # Namespace where Frigate is deployed
  namespace: frigate
  # Port where Frigate API is exposed
  port: 5000

k8sServices:
  main:
    enabled: true
    annotations: {}
    labels: {}
    ports:
      main:
        protocol: TCP
        port: 9100

serviceMonitors:
  main:
    enabled: true
    endpoints:
      - port: main
