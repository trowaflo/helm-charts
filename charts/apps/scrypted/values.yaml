---
# Scrypted runs as root by default: it installs plugins at runtime and writes
# outside /server/volume. Disable runAsNonRoot and readOnlyRootFilesystem accordingly.

statefulsets:
  main:
    enabled: true
    podSpec:
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        fsGroup: 0
        fsGroupChangePolicy: OnRootMismatch
      containers:
        main:
          image:
            repository: ghcr.io/koush/scrypted
            # Pin to a digest for production, e.g.: latest@sha256:<digest>
            tag: latest
            pullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          ports:
            http:
              containerPort: 11080
            https:
              containerPort: 10443
          livenessProbe:
            httpGet:
              path: /
              port: 11080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 11080
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            limits:
              cpu: 2000m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /server/volume
    # Dynamic PVC (default). For an NFS-backed volume, either:
    #   a) Use a StorageClass that provisions NFS (e.g. storageClassName: nfs-client)
    #   b) Set volumeClaimTemplates: [] and add a pre-created PVC via podSpec.volumes:
    #        volumes:
    #          - name: config
    #            persistentVolumeClaim:
    #              claimName: scrypted-config-nfs
    volumeClaimTemplates:
      - metadata:
          name: config
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi
          # storageClassName: ""  # leave empty to use cluster default, or set e.g. nfs-client

k8sServices:
  main:
    enabled: true
    type: ClusterIP
    annotations: {}
    labels: {}
    ports:
      main: ~
      http:
        protocol: TCP
        port: 11080
      https:
        protocol: TCP
        port: 10443

ingresses:
  main:
    enabled: false
    hosts:
      - host: scrypted.example.com
        paths:
          - path: /
            pathType: Prefix
