apiVersion: v1
kind: Service
metadata:
  name: ma-release-graphite-exporter-main
  namespace: ma-release-graphite-exporter
  labels:
    app.kubernetes.io/name: graphite-exporter
    helm.sh/chart: graphite-exporter-0.0.1
    app.kubernetes.io/instance: ma-release
    app.kubernetes.io/managed-by: Helm
spec:
  type: ClusterIP
  ports:
    - name: main
      port: 9108
