apiVersion: v1
kind: Service
metadata:
  name: ma-release-graphite-exporter-graphite
  namespace: ma-release-graphite-exporter
  labels:
    app.kubernetes.io/name: graphite-exporter
    helm.sh/chart: graphite-exporter-0.0.1
    app.kubernetes.io/instance: ma-release
    app.kubernetes.io/managed-by: Helm
spec:
  type: LoadBalancer
  ports:
    - name: graphite-tcp
      port: 9109
      protocol: TCP
      targetPort: graphite-tcp
    - name: graphite-udp
      port: 9109
      protocol: UDP
      targetPort: graphite-udp
  selector:
    app.kubernetes.io/name: graphite-exporter
    app.kubernetes.io/instance: ma-release
...
