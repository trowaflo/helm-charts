---
extends: default

# Helm Go-template files are not valid YAML — exclude them.
# Vendored dependency charts and packaged chart archives (.tgz) are also excluded.
ignore:
  - "**/templates/**"
  - "charts/**/charts/**"
  - "**/*.tgz"

rules:
  line-length:
    max: 150
  truthy:
    check-keys: false
  comments:
    min-spaces-from-content: 1
  document-start: disable
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1
