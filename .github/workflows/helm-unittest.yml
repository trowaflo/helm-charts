name: Helm Unit Test

on:
  pull_request:
    paths:
      - 'charts/**'
  push:
    branches:
      - main
    paths:
      - 'charts/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.6

      - name: Install Helm Unittest Plugin
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest.git --version v0.6.3

      - name: Build Helm Dependencies
        run: |
          if [ -d "charts/frigate-exporter/tests" ]; then
            echo "Building dependencies for frigate-exporter..."
            helm dependency update charts/frigate-exporter
          fi

      - name: Run Helm Unit Tests
        run: |
          if [ -d "charts/frigate-exporter/tests" ]; then
            echo "Running tests for frigate-exporter chart..."
            helm unittest "charts/frigate-exporter"
          else
            echo "No tests found for frigate-exporter, skipping..."
          fi
