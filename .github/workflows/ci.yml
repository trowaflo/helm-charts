name: CI

on:
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  quality:
    uses: trowaflo/github-actions/.github/workflows/quality.yml@a7086f13b298337461edc6c9ee1ac2ddce212116 # PR#35
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read
    with:
      harden_runner_egress_policy: audit
      enable_gitleaks: true
      enable_checkov: true
      enable_actionlint: true
      enable_trivy: true
      enable_dependency_review: true
      enable_yamllint: true
      enable_json_lint: true
      enable_markdown_lint: true
