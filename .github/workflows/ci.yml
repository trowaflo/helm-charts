name: CI

on:
  pull_request:
  workflow_dispatch:

permissions: read-all

jobs:
  quality:
    uses: trowaflo/github-actions/.github/workflows/quality.yml@413a8c048175f93fe186e2a2a645667a6a6ade00 # v4.0.0
    permissions:
      contents: read
      pull-requests: write
      security-events: write
      actions: read
    with:
      enable_gitleaks: true
      enable_checkov: true
      enable_actionlint: true
      enable_trivy: true
      enable_dependency_review: true
      enable_yamllint: true
      enable_json_lint: true
      enable_markdown_lint: true
