name: Helm Release

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"

permissions: read-all

jobs:
  release:
    uses: trowaflo/github-actions/.github/workflows/helm-release.yml@00e8609f90b2006fc546ca967e3edcac94ee0a45 # PR#35
    permissions:
      contents: write
      pages: write
    with:
      harden_runner_allowed_endpoints: >-
        github.com:443
        api.github.com:443
        objects.githubusercontent.com:443
        release-assets.githubusercontent.com:443
      enable_release: true
      release_charts_dirs: "charts/library charts/apps"
