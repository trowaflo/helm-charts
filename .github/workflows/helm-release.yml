name: Helm Release

on:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "charts/**"

permissions: read-all

jobs:
  release:
    uses: trowaflo/github-actions/.github/workflows/release-helm.yml@2464b3e45fadaadabfe7df91014d01490a0ad9c9 # v1.0.0
    permissions:
      contents: write
      pages: write
    with:
      enable_release: true
      release_charts_dirs: "charts/library charts/apps"
