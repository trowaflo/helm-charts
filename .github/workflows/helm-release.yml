name: Helm Release

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"

permissions: read-all

jobs:
  release:
    uses: trowaflo/github-actions/.github/workflows/helm-release.yml@413a8c048175f93fe186e2a2a645667a6a6ade00 # v4.0.0
    permissions:
      contents: write
      pages: write
      id-token: write
    with:
      harden_runner_allowed_endpoints: >-
        github.com:443
        api.github.com:443
        objects.githubusercontent.com:443
        release-assets.githubusercontent.com:443
      enable_release: true
      release_charts_dirs: "charts/library charts/apps"
