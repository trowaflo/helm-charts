name: Helm Release

on:
  # Manual re-trigger — useful when a squash & merge embedded [skip ci] in the
  # commit body (e.g. auto-bump/helm-docs bots) and suppressed the auto-release
  # on push to main. The reusable release-helm workflow gates its publish steps
  # on `github.event_name != 'pull_request'`, so workflow_dispatch fires release.
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
    paths:
      - "charts/**"

permissions: read-all

jobs:
  release:
    uses: trowaflo/github-actions/.github/workflows/release-helm.yml@8358d28b9b77208a15f1fa3536c03baca0d21650 # v2.1.0
    permissions:
      contents: write
      pages: write
      packages: write
    with:
      enable_release: true
      enable_oci_release: true
      release_charts_dirs: "charts/library charts/apps"
