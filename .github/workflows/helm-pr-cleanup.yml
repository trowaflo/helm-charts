name: Helm PR Cleanup

on:
  pull_request:
    types: [closed]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    uses: trowaflo/github-actions/.github/workflows/helm-pr-cleanup.yml@413a8c048175f93fe186e2a2a645667a6a6ade00 # v4.0.0
    permissions:
      contents: write
      pull-requests: write
