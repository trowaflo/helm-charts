name: Helm PR Cleanup

on:
  pull_request:
    types: [closed]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    uses: trowaflo/github-actions/.github/workflows/helm-pr-cleanup.yml@00e8609f90b2006fc546ca967e3edcac94ee0a45 # PR#35
    permissions:
      contents: write
      pull-requests: write
