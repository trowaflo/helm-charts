name: Helm PR Cleanup

on:
  pull_request:
    types: [closed]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    uses: trowaflo/github-actions/.github/workflows/ci-helm-cleanup.yml@13b5535f3d2279c29be7438527625372e8ba1c19 # v2.0.0
    permissions:
      contents: write
      packages: write
      pull-requests: write
    with:
      enable_oci_cleanup: true
    secrets:
      OCI_CLEANUP_TOKEN: ${{ secrets.OCI_CLEANUP_TOKEN }}
