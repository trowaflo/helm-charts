name: Helm PR Cleanup

on:
  pull_request:
    types: [closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    uses: trowaflo/github-actions/.github/workflows/helm.yml@a7086f13b298337461edc6c9ee1ac2ddce212116 # PR#35
    permissions:
      contents: write
      pull-requests: write
      pages: write
      checks: write
    with:
      enable_pr_cleanup: true
