name: Helm PR Cleanup

on:
  pull_request:
    types: [closed]

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cleanup:
    uses: trowaflo/github-actions/.github/workflows/ci-helm-cleanup.yml@8358d28b9b77208a15f1fa3536c03baca0d21650 # v2.1.0
    permissions:
      contents: write
      packages: write
      pull-requests: write
    with:
      enable_oci_cleanup: true
    secrets:
      OCI_CLEANUP_TOKEN: ${{ secrets.OCI_CLEANUP_TOKEN }}
