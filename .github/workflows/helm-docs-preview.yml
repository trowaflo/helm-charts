name: Preview Helm Docs

on:
  pull_request:
    branches:
      - main

jobs:
  list-charts:
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.list-charts.outputs.charts }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - id: list-charts
        run: |
          charts=$(find charts/apps -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | jq -R -s -c 'split("\n")[:-1]')
          echo "charts=$charts" >> $GITHUB_OUTPUT

  preview-docs:
    runs-on: ubuntu-latest
    needs: list-charts
    strategy:
      matrix:
        chart: ${{ fromJSON(needs.list-charts.outputs.charts) }}
      max-parallel: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install helm-docs
        run: |
          OS=$(uname -s)
          ARCH=$(uname -m)

          case "$ARCH" in
            x86_64)
              ASSET_ARCH="x86_64"
              ;;
            aarch64)
              ASSET_ARCH="arm64"
              ;;
            *)
              echo "Unsupported architecture: $ARCH"
              exit 1
              ;;
          esac

          case "$OS" in
            Linux)
              ASSET_OS="Linux"
              ;;
            Darwin)
              ASSET_OS="Darwin"
              ;;
            *)
              echo "Unsupported OS: $OS"
              exit 1
              ;;
          esac

          VERSION=$(curl -s https://api.github.com/repos/norwoodj/helm-docs/releases/latest | jq -r '.tag_name')
          echo "Latest version: $VERSION"
          URL="https://github.com/norwoodj/helm-docs/releases/download/${VERSION}/helm-docs_${VERSION#v}_${ASSET_OS}_${ASSET_ARCH}.tar.gz"

          echo "Downloading from: $URL"
          curl -sSL "$URL" \
            -o helm-docs.tar.gz

          tar -xzf helm-docs.tar.gz -C /usr/local/bin
          rm helm-docs.tar.gz

      - name: Generate documentation for chart ${{ matrix.chart }}
        run: helm-docs --chart-search-root charts/apps/${{ matrix.chart }}

      - name: Publish Helm Docs Summary
        run: |
          SUMMARY_FILE="${GITHUB_STEP_SUMMARY:-./summary.md}"
          README="charts/apps/${{ matrix.chart }}/README.md"

          echo "### Chart: ${{ matrix.chart }}" >> "$SUMMARY_FILE"
          echo "" >> "$SUMMARY_FILE"

          if [[ -f "$README" ]]; then
            head -n 15 "$README" >> "$SUMMARY_FILE"
            echo "..." >> "$SUMMARY_FILE"
            echo "" >> "$SUMMARY_FILE"
          else
            echo "_README not found_" >> "$SUMMARY_FILE"
            echo "" >> "$SUMMARY_FILE"
          fi

      - name: Archive generated docs for download
        run: |
          ZIP_FILE="helm-docs-preview.zip"
          find charts -name README.md | zip -@ "$ZIP_FILE"
          echo "Helm docs archived: $ZIP_FILE" >> "${GITHUB_STEP_SUMMARY:-./summary.md}"
