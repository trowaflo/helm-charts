suite: test common chart - ServiceMonitor
templates:
  - templates/common.yaml
values:
  - values/default.yaml
set:
  nameOverride: "service-monitor-name-override"
release:
  name: common-test
  namespace: common-test
tests:
  # Test that no ServiceMonitor is rendered by default (all workloads disabled in test values.yaml)
  - it: should not render ServiceMonitor by default
    asserts:
      - hasDocuments:
          count: 0

  # Test basic ServiceMonitor rendering
  - it: should render ServiceMonitor when enabled
    set:
      serviceMonitors:
        main:
          enabled: true
          labels:
            release: prometheus
          endpoints:
            - port: main
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - matchSnapshot: {}

  # Test computed values - fullnameOverride
  - it: should compute fullnameOverride correctly
    set:
      fullnameOverride: "my-servicemonitor"
      serviceMonitors:
        main:
          enabled: true
          labels:
            release: prometheus
          endpoints:
            - port: main
    asserts:
      - equal:
          path: metadata.name
          value: my-servicemonitor-main

  # Test computed values - nameOverride
  - it: should compute nameOverride correctly
    set:
      nameOverride: "custom"
      serviceMonitors:
        main:
          enabled: true
          labels:
            release: prometheus
          endpoints:
            - port: main
    asserts:
      - equal:
          path: "spec.selector.matchLabels[\"app.kubernetes.io/name\"]"
          value: custom

  - it: should contain metricRelabelings when defined
    set:
      serviceMonitors:
        main:
          enabled: true
          labels:
            release: prometheus
          endpoints:
            - port: main
              metricRelabelings:
                - sourceLabels: ["__name__"]
                  regex: "go_.*"
                  action: "keep"
    asserts:
      - lengthEqual:
          path: "spec.endpoints[0].metricRelabelings"
          count: 1

  - it: should contain relabelings when defined
    set:
      serviceMonitors:
        main:
          enabled: true
          labels:
            release: prometheus
          endpoints:
            - port: main
              relabelings:
                - sourceLabels: ["__name__"]
                  regex: "go_.*"
                  action: "keep"
    asserts:
      - lengthEqual:
          path: "spec.endpoints[0].relabelings"
          count: 1

  - it: should honor targetService in selector
    set:
      serviceMonitors:
        metrics:
          enabled: true
          targetService: web
          labels:
            release: prometheus
          endpoints:
            - port: metrics
    asserts:
      - equal:
          path: "spec.selector.matchLabels[\"app.kubernetes.io/component\"]"
          value: web

  - it: should render multiple ServiceMonitors
    set:
      serviceMonitors:
        main:
          enabled: true
          labels:
            release: prometheus
          endpoints:
            - port: main
        api:
          enabled: true
          labels:
            release: prometheus
          endpoints:
            - port: api
    asserts:
      - hasDocuments:
          count: 2
