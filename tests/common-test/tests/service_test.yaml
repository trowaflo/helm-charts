suite: test common chart - Service
templates:
  - templates/common.yaml
values:
  - values/default.yaml
set:
  nameOverride: "service-name-override"
  k8sServices:
    main:
      enabled: true
      type: ClusterIP
      ports:
        main:
          protocol: TCP
          port: 80
release:
  name: common-test
  namespace: common-test
tests:
  # Snapshot = validates complete coherence with default values
  - it: should match snapshot with default values
    asserts:
      - matchSnapshot: {}

  # Test computed values - fullnameOverride
  - it: should compute fullnameOverride correctly
    set:
      fullnameOverride: "my-service"
    asserts:
      - equal:
          path: metadata.name
          value: my-service-main
      - matchSnapshot: {}

  # Test computed values - nameOverride
  - it: should compute nameOverride correctly
    set:
      nameOverride: "custom"
    asserts:
      - equal:
          path: "metadata.labels[\"app.kubernetes.io/name\"]"
          value: custom
      - equal:
          path: "spec.selector[\"app.kubernetes.io/name\"]"
          value: custom
      - matchSnapshot: {}

  - it: should have the correct service type
    set:
      k8sServices:
        main:
          enabled: true
          type: LoadBalancer
          ports:
            main:
              port: 80
              protocol: TCP
    asserts:
      - equal:
          path: "spec.type"
          value: LoadBalancer
      - matchSnapshot: {}

  # Test component-based selector isolation
  - it: should select target workload via targetComponent
    set:
      k8sServices:
        main:
          enabled: false
        web:
          enabled: true
          ports:
            http:
              port: 80
              protocol: TCP
        metrics:
          enabled: true
          targetComponent: web
          ports:
            metrics:
              port: 9090
              protocol: TCP
    asserts:
      # metrics=doc 0, web=doc 1 (alphabetical)
      - documentIndex: 0
        equal:
          path: metadata.name
          value: common-test-service-name-override-metrics
      - documentIndex: 0
        equal:
          path: "spec.selector[\"app.kubernetes.io/component\"]"
          value: web
      - documentIndex: 1
        equal:
          path: metadata.name
          value: common-test-service-name-override-web
      - documentIndex: 1
        equal:
          path: "spec.selector[\"app.kubernetes.io/component\"]"
          value: web

  - it: should have all defined service type and ports
    documentIndex: 0
    set:
      k8sServices:
        main: # main is documentIndex 1 because of ordering by name
          enabled: true
          ports:
            main:
              port: 9200
              protocol: TCP
        extra: # extra is documentIndex 0 because of ordering by name
          enabled: true
          type: LoadBalancer
          ports:
            http:
              port: 8080
              protocol: TCP
            metrics:
              port: 9100
              protocol: UDP
    asserts:
      - equal:
          path: "spec.ports"
          value:
            - name: http
              port: 8080
              protocol: TCP
              targetPort: http
            - name: metrics
              port: 9100
              protocol: UDP
              targetPort: metrics
      - matchSnapshot: {}
