# Test Coverage Documentation
# ============================
# This test suite validates the StatefulSet manifest rendering from the common library.
#
# Covered Test Cases:
# - [x] Resource not rendered when disabled
# - [x] Basic StatefulSet rendering with minimal configuration
# - [x] Metadata (name, namespace, labels) correctness
# - [x] Service name configuration
# - [x] Replica count configuration
# - [x] Container environment variables
# - [x] Container resource requests and limits
# - [x] VolumeClaimTemplates configuration
# - [x] Pod management policy
# - [x] Update strategy
# - [x] Persistent volume configuration
# - [x] Init containers
# - [x] Pod affinity and anti-affinity
# - [x] Node selectors and tolerations
#
# All test cases now covered!
# ============================

suite: test common chart - StatefulSet
templates:
  - templates/common.yaml
release:
  name: common-test
  namespace: common-test
tests:
  # Test that StatefulSet is not rendered when disabled
  - it: should not render StatefulSet when disabled
    set:
      statefulsets:
        test:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should fail when enabled without containers
    set:
      statefulsets:
        redis:
          enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "statefulsets.redis.podSpec.containers is required and must define at least one container when enabled"

  - it: should fail when volumeClaimTemplates entry lacks storage
    set:
      statefulsets:
        redis:
          enabled: true
          volumeClaimTemplates:
            - metadata:
                name: data
              spec:
                accessModes:
                  - ReadWriteOnce
          podSpec:
            containers:
              redis:
                image:
                  repository: redis
                  tag: 7-alpine
    asserts:
      - failedTemplate:
          errorMessage: "statefulsets.redis.volumeClaimTemplates[data].spec.resources.requests.storage is required"

  - it: should preserve replicas=0 and revisionHistoryLimit=0
    set:
      statefulsets:
        redis:
          enabled: true
          replicas: 0
          revisionHistoryLimit: 0
          podSpec:
            containers:
              redis:
                image:
                  repository: redis
                  tag: 7-alpine
    asserts:
      - equal:
          path: spec.replicas
          value: 0
      - equal:
          path: spec.revisionHistoryLimit
          value: 0

  - it: should render serviceAccountName when provided
    set:
      statefulsets:
        redis:
          enabled: true
          podSpec:
            serviceAccountName: redis-runner
            containers:
              redis:
                image:
                  repository: redis
                  tag: 7-alpine
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: redis-runner

  - it: should honor serviceName override
    set:
      statefulsets:
        redis:
          enabled: true
          serviceName: custom-headless
          podSpec:
            containers:
              redis:
                image:
                  repository: redis
                  tag: 7-alpine
    asserts:
      - equal:
          path: spec.serviceName
          value: custom-headless

  # Test basic StatefulSet rendering
  - it: should render StatefulSet with minimal config
    set:
      statefulsets:
        redis:
          enabled: true
          podSpec:
            containers:
              redis:
                image:
                  repository: redis
                  tag: 7-alpine
                  pullPolicy: IfNotPresent
                ports:
                  redis:
                    containerPort: 6379
                    protocol: TCP
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.name
          value: common-test-redis
      - equal:
          path: spec.serviceName
          value: common-test-redis
      - equal:
          path: spec.replicas
          value: 1

  # Test container configuration
  - it: should render container with env and resources
    set:
      statefulsets:
        redis:
          enabled: true
          podSpec:
            containers:
              redis:
                image:
                  repository: redis
                  tag: 7-alpine
                env:
                  - name: TEST_VAR
                    value: test-value
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEST_VAR
            value: test-value
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m

  # Test volumeClaimTemplates
  - it: should render volumeClaimTemplates
    set:
      statefulsets:
        redis:
          enabled: true
          volumeClaimTemplates:
            - metadata:
                name: data
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
          podSpec:
            containers:
              redis:
                image:
                  repository: redis
                  tag: 7-alpine
    asserts:
      - isNotEmpty:
          path: spec.volumeClaimTemplates
      - equal:
          path: spec.volumeClaimTemplates[0].metadata.name
          value: data

  # Test pod management policy
  - it: should render pod management policy
    set:
      statefulsets:
        redis:
          enabled: true
          podManagementPolicy: Parallel
          podSpec:
            containers:
              redis:
                image:
                  repository: redis
                  tag: 7-alpine
    asserts:
      - equal:
          path: spec.podManagementPolicy
          value: Parallel

  # Test update strategy
  - it: should render update strategy
    set:
      statefulsets:
        redis:
          enabled: true
          updateStrategy:
            type: RollingUpdate
            rollingUpdate:
              partition: 2
          podSpec:
            containers:
              redis:
                image:
                  repository: redis
                  tag: 7-alpine
    asserts:
      - equal:
          path: spec.updateStrategy.type
          value: RollingUpdate
      - equal:
          path: spec.updateStrategy.rollingUpdate.partition
          value: 2

  # Test persistent volume configuration with volumeClaimTemplates
  - it: should render persistent volume configuration
    set:
      statefulsets:
        redis:
          enabled: true
          volumeClaimTemplates:
            - metadata:
                name: data
              spec:
                accessModes:
                  - ReadWriteOnce
                storageClassName: fast-ssd
                resources:
                  requests:
                    storage: 10Gi
          podSpec:
            containers:
              redis:
                image:
                  repository: redis
                  tag: 7-alpine
                volumeMounts:
                  - name: data
                    mountPath: /data
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: fast-ssd
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 10Gi
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data

  # Test init containers
  - it: should render init containers
    set:
      statefulsets:
        redis:
          enabled: true
          volumeClaimTemplates:
            - metadata:
                name: data
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: 1Gi
          podSpec:
            initContainers:
              - name: init-permissions
                image: busybox:1.36
                command: ['sh', '-c', 'chown -R 999:999 /data']
                volumeMounts:
                  - name: data
                    mountPath: /data
            containers:
              redis:
                image:
                  repository: redis
                  tag: 7-alpine
    asserts:
      - isNotNull:
          path: spec.template.spec.initContainers
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: init-permissions
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: busybox:1.36

  # Test pod affinity and anti-affinity
  - it: should render pod affinity and anti-affinity
    set:
      statefulsets:
        redis:
          enabled: true
          podSpec:
            containers:
              redis:
                image:
                  repository: redis
                  tag: 7-alpine
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/name
                          operator: In
                          values:
                            - common-test-redis
                    topologyKey: kubernetes.io/hostname
    asserts:
      - isNotNull:
          path: spec.template.spec.affinity.podAntiAffinity
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution[0].topologyKey
          value: kubernetes.io/hostname

  # Test node selectors and tolerations
  - it: should render node selectors and tolerations
    set:
      statefulsets:
        redis:
          enabled: true
          podSpec:
            containers:
              redis:
                image:
                  repository: redis
                  tag: 7-alpine
            nodeSelector:
              disktype: ssd
              tier: database
            tolerations:
              - key: "database"
                operator: "Equal"
                value: "redis"
                effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd
      - equal:
          path: spec.template.spec.nodeSelector.tier
          value: database
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: "database"
            operator: "Equal"
            value: "redis"
            effect: "NoSchedule"
