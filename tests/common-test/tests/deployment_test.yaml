# Test Coverage Documentation
# ============================
# This test suite validates the Deployment manifest rendering from the common library.
#
# Covered Test Cases:
# - [x] Resource not rendered when disabled
# - [x] Basic deployment rendering with minimal configuration
# - [x] Metadata (name, namespace, labels) correctness
# - [x] Name override (nameOverride and fullnameOverride) functionality
# - [x] Container environment variables (list form and map form)
# - [x] Env map with tpl expansion (scalar + valueFrom)
# - [x] Env map nil-value guard
# - [x] Container resource requests and limits
# - [x] Liveness and readiness probes
# - [x] Replica count configuration
# - [x] Multiple containers in single deployment
# - [x] Volume mounts and volumes
# - [x] Init containers
# - [x] Pod affinity and anti-affinity
# - [x] Node selectors and tolerations
# - [x] Security contexts (pod and container level)
# - [x] Image pull secrets
# ============================

suite: test common chart - Deployment
templates:
  - templates/common.yaml
values:
  - values/default.yaml
set:
  nameOverride: "deployment-name-override"
release:
  name: common-test
  namespace: common-test
tests:
  # Test that no Deployment is rendered by default (deployments: {})
  - it: should not render Deployment by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should fail when enabled without containers
    set:
      deployments:
        main:
          enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "deployments.main.podSpec.containers is required and must define at least one container when enabled"

  - it: should fail when container port has neither containerPort nor port
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                ports:
                  http:
                    protocol: TCP
    asserts:
      - failedTemplate:
          errorMessage: "container \"main\" port \"http\": containerPort (or port) is required"

  - it: should apply default container securityContext
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  - it: should replace default capabilities.drop when user provides it (mergeOverwrite list semantics)
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                securityContext:
                  capabilities:
                    drop:
                      - NET_RAW
    asserts:
      # user's drop replaces default drop: [ALL] wholesale
      - equal:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          value:
            - NET_RAW

  - it: should render serviceAccountName when provided
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            serviceAccountName: app-runner
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: app-runner

  - it: should merge user securityContext over defaults (capabilities.add preserved)
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                securityContext:
                  runAsUser: 1000
                  capabilities:
                    add:
                      - NET_BIND_SERVICE
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 1000
      # Defaults still applied
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.add
          content: NET_BIND_SERVICE

  # Test basic Deployment rendering
  - it: should render Deployment with minimal config
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                  pullPolicy: IfNotPresent
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: common-test-deployment-name-override-main
      - equal:
          path: spec.replicas
          value: 1

  # Test computed values - fullnameOverride
  - it: should compute fullnameOverride correctly
    set:
      fullnameOverride: "my-custom-name"
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-name-main

  # Test computed values - nameOverride
  - it: should compute nameOverride correctly
    set:
      nameOverride: "custom"
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
    asserts:
      - equal:
          path: "metadata.labels[\"app.kubernetes.io/name\"]"
          value: custom

  # Test container with env and resources
  - it: should render container with env and resources
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                env:
                  - name: TEST_VAR
                    value: test-value
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TEST_VAR
            value: test-value
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m

  # Test probes
  - it: should render probes when configured
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                livenessProbe:
                  httpGet:
                    path: /health
                    port: http
                  initialDelaySeconds: 30
                readinessProbe:
                  httpGet:
                    path: /ready
                    port: http
                  initialDelaySeconds: 10
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /ready

  # Test multiple containers
  - it: should render multiple containers
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
              sidecar:
                image:
                  repository: busybox
                  tag: "1.36"
                command: ["/bin/sh"]
                args: ["-c", "while true; do echo hello; sleep 10; done"]
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: spec.template.spec.containers[0].name
          value: main
      - equal:
          path: spec.template.spec.containers[1].name
          value: sidecar
      - equal:
          path: spec.template.spec.containers[1].image
          value: busybox:1.36

  # Test volumes and volume mounts
  - it: should render volumes and volume mounts
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                volumeMounts:
                  - name: config
                    mountPath: /etc/config
                  - name: data
                    mountPath: /data
            volumes:
              - name: config
                configMap:
                  name: app-config
              - name: data
                emptyDir: {}
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /etc/config
      - contains:
          path: spec.template.spec.volumes
          content:
            name: config
            configMap:
              name: app-config
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  # Test init containers
  - it: should render init containers
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            initContainers:
              - name: init-db
                image: busybox:1.36
                command: ['sh', '-c', 'until nc -z db 5432; do echo waiting for db; sleep 2; done']
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
    asserts:
      - isNotNull:
          path: spec.template.spec.initContainers
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: init-db
      - equal:
          path: spec.template.spec.initContainers[0].image
          value: busybox:1.36

  # Test pod affinity and anti-affinity
  - it: should render pod affinity and anti-affinity
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
            affinity:
              podAntiAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  - labelSelector:
                      matchExpressions:
                        - key: app.kubernetes.io/name
                          operator: In
                          values:
                            - nginx
                    topologyKey: kubernetes.io/hostname
              podAffinity:
                preferredDuringSchedulingIgnoredDuringExecution:
                  - weight: 100
                    podAffinityTerm:
                      labelSelector:
                        matchExpressions:
                          - key: app.kubernetes.io/component
                            operator: In
                            values:
                              - cache
                      topologyKey: kubernetes.io/hostname
    asserts:
      - isNotNull:
          path: spec.template.spec.affinity.podAntiAffinity
      - equal:
          path: spec.template.spec.affinity.podAntiAffinity.requiredDuringSchedulingIgnoredDuringExecution[0].topologyKey
          value: kubernetes.io/hostname
      - isNotNull:
          path: spec.template.spec.affinity.podAffinity
      - equal:
          path: spec.template.spec.affinity.podAffinity.preferredDuringSchedulingIgnoredDuringExecution[0].weight
          value: 100

  # Test node selectors and tolerations
  - it: should render node selectors and tolerations
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
            nodeSelector:
              disktype: ssd
              env: production
            tolerations:
              - key: "node.kubernetes.io/not-ready"
                operator: "Exists"
                effect: "NoExecute"
                tolerationSeconds: 300
              - key: "dedicated"
                operator: "Equal"
                value: "gpu"
                effect: "NoSchedule"
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd
      - equal:
          path: spec.template.spec.nodeSelector.env
          value: production
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: "node.kubernetes.io/not-ready"
            operator: "Exists"
            effect: "NoExecute"
            tolerationSeconds: 300
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: "dedicated"
            operator: "Equal"
            value: "gpu"
            effect: "NoSchedule"

  # Test security contexts
  - it: should render pod and container security contexts
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            securityContext:
              runAsNonRoot: true
              runAsUser: 1000
              fsGroup: 2000
              seccompProfile:
                type: RuntimeDefault
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                  readOnlyRootFilesystem: true
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 2000
      - equal:
          path: spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
      - contains:
          path: spec.template.spec.containers[0].securityContext.capabilities.drop
          content: ALL

  # Test container port protocol validation via common.helpers.protocol
  - it: should fail rendering when container port protocol is invalid
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                ports:
                  http:
                    containerPort: 80
                    protocol: INVALID
    asserts:
      - failedTemplate:
          errorMessage: "Invalid protocol: INVALID. Expected: TCP, UDP, or SCTP."

  - it: should accept valid container port protocols
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                ports:
                  http:
                    containerPort: 80
                    protocol: tcp
                  udp:
                    containerPort: 53
                    protocol: UDP
                  sctp:
                    containerPort: 999
                    protocol: SCTP
    asserts:
      # Port map is iterated in alphabetical key order: http, sctp, udp
      - equal:
          path: spec.template.spec.containers[0].ports[0].protocol
          value: TCP
      - equal:
          path: spec.template.spec.containers[0].ports[1].protocol
          value: SCTP
      - equal:
          path: spec.template.spec.containers[0].ports[2].protocol
          value: UDP

  - it: should preserve replicas=0 (scale-to-zero) and revisionHistoryLimit=0
    set:
      deployments:
        main:
          enabled: true
          replicas: 0
          revisionHistoryLimit: 0
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
    asserts:
      - equal:
          path: spec.replicas
          value: 0
      - equal:
          path: spec.revisionHistoryLimit
          value: 0

  - it: should render strategy as a full map (rollingUpdate params)
    set:
      deployments:
        main:
          enabled: true
          strategy:
            type: RollingUpdate
            rollingUpdate:
              maxSurge: 25%
              maxUnavailable: 0
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate
      - equal:
          path: spec.strategy.rollingUpdate.maxSurge
          value: 25%
      - equal:
          path: spec.strategy.rollingUpdate.maxUnavailable
          value: 0

  - it: should default enableServiceLinks to false and accept override
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
        withlinks:
          enabled: true
          podSpec:
            enableServiceLinks: true
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
    asserts:
      # main=doc 0 (alphabetical), withlinks=doc 1
      - documentIndex: 0
        equal:
          path: spec.template.spec.enableServiceLinks
          value: false
      - documentIndex: 1
        equal:
          path: spec.template.spec.enableServiceLinks
          value: true

  - it: should render hardening pod-spec fields
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            shareProcessNamespace: true
            hostNetwork: false
            dnsPolicy: ClusterFirst
            dnsConfig:
              nameservers: ["8.8.8.8"]
            hostAliases:
              - ip: 127.0.0.1
                hostnames: ["localhost.alias"]
            schedulerName: custom-scheduler
            runtimeClassName: gvisor
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
    asserts:
      - equal:
          path: spec.template.spec.shareProcessNamespace
          value: true
      - equal:
          path: spec.template.spec.hostNetwork
          value: false
      - equal:
          path: spec.template.spec.dnsPolicy
          value: ClusterFirst
      - equal:
          path: spec.template.spec.dnsConfig.nameservers[0]
          value: 8.8.8.8
      - equal:
          path: spec.template.spec.hostAliases[0].ip
          value: 127.0.0.1
      - equal:
          path: spec.template.spec.schedulerName
          value: custom-scheduler
      - equal:
          path: spec.template.spec.runtimeClassName
          value: gvisor

  - it: should render prod knobs (terminationGracePeriodSeconds=0, priorityClassName, topologySpreadConstraints)
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            terminationGracePeriodSeconds: 0
            priorityClassName: high-prio
            topologySpreadConstraints:
              - maxSkew: 1
                topologyKey: kubernetes.io/hostname
                whenUnsatisfiable: DoNotSchedule
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: common-test
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
    asserts:
      - equal:
          path: spec.template.spec.terminationGracePeriodSeconds
          value: 0
      - equal:
          path: spec.template.spec.priorityClassName
          value: high-prio
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].maxSkew
          value: 1
      - equal:
          path: spec.template.spec.topologySpreadConstraints[0].whenUnsatisfiable
          value: DoNotSchedule

  # Test image pull secrets
  - it: should render image pull secrets
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            imagePullSecrets:
              - name: regcred
              - name: dockerhub
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
    asserts:
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: regcred
      - contains:
          path: spec.template.spec.imagePullSecrets
          content:
            name: dockerhub

  - it: should render env from map form with plain string
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                env:
                  NODE_ENV: production
                  LOG_LEVEL: debug
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: NODE_ENV
            value: production
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LOG_LEVEL
            value: debug

  - it: should render env from map form with secretKeyRef
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                env:
                  DATABASE_URL:
                    secretKeyRef:
                      name: app-db-secret
                      key: uri
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: app-db-secret
                key: uri

  - it: should render env from map form with configMapKeyRef
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                env:
                  APP_CONFIG:
                    configMapKeyRef:
                      name: app-config
                      key: settings
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: APP_CONFIG
            valueFrom:
              configMapKeyRef:
                name: app-config
                key: settings

  - it: should render env from map form with fieldRef
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                env:
                  POD_NAME:
                    fieldRef:
                      fieldPath: metadata.name
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name

  - it: should render templated plain scalar env value via tpl
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                env:
                  REDIS_HOST: "{{ .Release.Name }}-redis"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_HOST
            value: common-test-redis

  - it: should render templated secretKeyRef name via tpl
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                env:
                  DATABASE_URL:
                    secretKeyRef:
                      name: '{{ include "common.helpers.fullname" . }}-postgresql-app'
                      key: uri
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: common-test-deployment-name-override-postgresql-app
                key: uri

  - it: should still render env from list form (backward compat)
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                env:
                  - name: LEGACY_VAR
                    value: legacy-value
                  - name: LEGACY_SECRET
                    valueFrom:
                      secretKeyRef:
                        name: s
                        key: k
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LEGACY_VAR
            value: legacy-value
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: LEGACY_SECRET
            valueFrom:
              secretKeyRef:
                name: s
                key: k

  # A4: guard nil env values (must fail loudly, not silently render as "<nil>")
  - it: should fail when env map value is nil
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                env:
                  OOPS: null
    asserts:
      - failedTemplate:
          errorMessage: "container main env OOPS: value is nil (did you forget a value, or mean to use valueFrom?)"

  # C4: mixed-form env (scalar + secretKeyRef + configMapKeyRef + fieldRef in same map)
  - it: should render mixed-form env map with scalars and refs together
    set:
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                env:
                  PLAIN: hello
                  FROM_SECRET:
                    secretKeyRef:
                      name: s1
                      key: k1
                  FROM_CONFIGMAP:
                    configMapKeyRef:
                      name: c1
                      key: k2
                  FROM_FIELD:
                    fieldRef:
                      fieldPath: metadata.name
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PLAIN
            value: hello
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FROM_SECRET
            valueFrom:
              secretKeyRef:
                name: s1
                key: k1
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FROM_CONFIGMAP
            valueFrom:
              configMapKeyRef:
                name: c1
                key: k2
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FROM_FIELD
            valueFrom:
              fieldRef:
                fieldPath: metadata.name

  # C5: secretKeyRef auto-expansion with .Values.secrets
  - it: should auto-expand secretKeyRef name matching a secrets key
    set:
      secrets:
        my-secret:
          enabled: true
          data:
            TOKEN: ""
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                env:
                  MY_TOKEN:
                    secretKeyRef:
                      name: my-secret
                      key: TOKEN
    asserts:
      - documentIndex: 1
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_TOKEN
            valueFrom:
              secretKeyRef:
                name: common-test-deployment-name-override-my-secret
                key: TOKEN

  # C6: secretKeyRef auto-expansion with .Values.cnpgClusters
  - it: should auto-expand secretKeyRef name matching a cnpgClusters key
    set:
      cnpgClusters:
        postgresql:
          enabled: true
          imageName: ghcr.io/cloudnative-pg/postgresql:16
          instances: 1
          storage:
            size: 1Gi
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                env:
                  DATABASE_URL:
                    secretKeyRef:
                      name: postgresql
                      key: uri
    asserts:
      - documentIndex: 1
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: common-test-deployment-name-override-postgresql-app
                key: uri

  # C7: secretKeyRef expandObjectName=false disables auto-expansion
  - it: should not auto-expand when expandObjectName is false
    set:
      secrets:
        my-secret:
          enabled: true
          data:
            TOKEN: ""
      deployments:
        main:
          enabled: true
          podSpec:
            containers:
              main:
                image:
                  repository: nginx
                  tag: latest
                env:
                  MY_TOKEN:
                    secretKeyRef:
                      name: my-secret
                      key: TOKEN
                      expandObjectName: false
    asserts:
      - documentIndex: 1
        contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: TOKEN
