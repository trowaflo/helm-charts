suite: test common chart - Ingress
templates:
  - templates/common.yaml
values:
  - values/default.yaml
set:
  ingresses:
    main:
      enabled: true
      hosts:
        - host: chart-example.local
          paths:
            - path: /
              pathType: Prefix
release:
  name: ingress-test
  namespace: namespace-test
tests:
  # Snapshot = validates complete coherence with default values
  - it: should match snapshot with default values
    asserts:
      - matchSnapshot: {}

  # Test computed values - fullnameOverride
  - it: should compute fullnameOverride correctly
    set:
      fullnameOverride: "my-ingress"
    asserts:
      - equal:
          path: metadata.name
          value: my-ingress-main
      - matchSnapshot: {}

  # Test computed values - nameOverride
  - it: should compute nameOverride correctly
    set:
      nameOverride: "name-override"
    asserts:
      - equal:
          path: "metadata.labels[\"app.kubernetes.io/name\"]"
          value: name-override
      - matchSnapshot: {}

  - it: should fail when enabled without hosts
    set:
      ingresses:
        main:
          enabled: true
          hosts: null
    asserts:
      - failedTemplate:
          errorMessage: "ingresses.main.hosts is required and must contain at least one entry when enabled"

  - it: should fail when a host has no paths
    set:
      ingresses:
        main:
          enabled: true
          hosts:
            - host: chart-example.local
              paths: []
    asserts:
      - failedTemplate:
          errorMessage: "ingresses.main host \"chart-example.local\": paths is required and must contain at least one entry"

  - it: should support backend.port.number override
    set:
      ingresses:
        main:
          enabled: true
          hosts:
            - host: api.example.com
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: custom-svc
                      port:
                        number: 8080
    asserts:
      - equal:
          path: "spec.rules[0].http.paths[0].backend.service.name"
          value: custom-svc
      - equal:
          path: "spec.rules[0].http.paths[0].backend.service.port.number"
          value: 8080

  - it: should support backend.port.name override (distinct from service key)
    set:
      ingresses:
        main:
          enabled: true
          hosts:
            - host: api.example.com
              paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      port:
                        name: http-api
    asserts:
      - equal:
          path: "spec.rules[0].http.paths[0].backend.service.port.name"
          value: http-api
      # service.name still defaults to <fullname>-<ingressName>
      - equal:
          path: "spec.rules[0].http.paths[0].backend.service.name"
          value: ingress-test-common-test-main

  - it: should have the right host configured
    set:
      ingresses:
        main:
          enabled: false
        other:
          enabled: true
          hosts:
            - host: "other.example.com"
              paths:
                - path: "/other-host-path"
                  pathType: Prefix
    asserts:
      - equal:
          path: "spec.rules[0].host"
          value: "other.example.com"
      - equal:
          path: "spec.rules[0].http.paths[0].path"
          value: "/other-host-path"
      - equal:
          path: "spec.rules[0].http.paths[0].pathType"
          value: "Prefix"
      - matchSnapshot: {}
