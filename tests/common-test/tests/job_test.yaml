# Test Coverage Documentation
# ============================
# This test suite validates the Job manifest rendering from the common library.
#
# Covered Test Cases:
# - [x] Resource not rendered when disabled
# - [x] Basic Job rendering with minimal configuration
# - [x] Metadata (name, namespace, labels) correctness
# - [x] Restart policy (default: OnFailure)
# - [x] Container command execution
# - [x] Container resource requests and limits
# - [x] TTL seconds after finished configuration
# - [x] Completions and parallelism
# - [x] Backoff limit configuration
# - [x] Active deadline seconds
# - [x] Multiple containers per job
# - [x] Volume mounts
# - [x] Pod failure policy
#
# All test cases now covered!
# ============================

suite: test common chart - Job
templates:
  - templates/common.yaml
release:
  name: common-test
  namespace: common-test
tests:
  # Test that Job is not rendered when disabled
  - it: should not render Job when disabled
    set:
      jobs:
        restore:
          enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should fail when enabled without containers
    set:
      jobs:
        restore:
          enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "jobs.restore.podSpec.containers is required and must define at least one container when enabled"

  - it: should render initContainers when provided
    set:
      jobs:
        restore:
          enabled: true
          podSpec:
            initContainers:
              - name: wait-for-db
                image: busybox:1.36
                command: ["sh", "-c", "until nc -z db 5432; do sleep 1; done"]
            containers:
              restore:
                image:
                  repository: postgres
                  tag: "16"
    asserts:
      - isNotNull:
          path: spec.template.spec.initContainers
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-db

  - it: should render serviceAccountName when provided
    set:
      jobs:
        restore:
          enabled: true
          podSpec:
            serviceAccountName: db-migrator
            containers:
              restore:
                image:
                  repository: postgres
                  tag: "16"
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: db-migrator

  - it: should render affinity when provided
    set:
      jobs:
        restore:
          enabled: true
          podSpec:
            containers:
              restore:
                image:
                  repository: postgres
                  tag: "16"
            affinity:
              nodeAffinity:
                requiredDuringSchedulingIgnoredDuringExecution:
                  nodeSelectorTerms:
                    - matchExpressions:
                        - key: disktype
                          operator: In
                          values: [ssd]
    asserts:
      - isNotNull:
          path: spec.template.spec.affinity
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: disktype

  # Test basic Job rendering
  - it: should render Job with minimal config
    set:
      jobs:
        restore:
          enabled: true
          podSpec:
            containers:
              restore:
                image:
                  repository: postgres
                  tag: "16"
                  pullPolicy: IfNotPresent
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Job
      - equal:
          path: metadata.name
          value: common-test-restore
      - equal:
          path: spec.template.spec.restartPolicy
          value: OnFailure

  # Test container configuration
  - it: should render container with command and resources
    set:
      jobs:
        restore:
          enabled: true
          podSpec:
            containers:
              restore:
                image:
                  repository: postgres
                  tag: "16"
                command:
                  - /bin/bash
                  - -c
                  - echo "restore"
                resources:
                  requests:
                    cpu: 100m
                    memory: 128Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].command[0]
          value: /bin/bash
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 100m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi

  # Test ttlSecondsAfterFinished
  - it: should configure ttlSecondsAfterFinished
    set:
      jobs:
        restore:
          enabled: true
          ttlSecondsAfterFinished: 86400
          podSpec:
            containers:
              restore:
                image:
                  repository: postgres
                  tag: "16"
    asserts:
      - equal:
          path: spec.ttlSecondsAfterFinished
          value: 86400

  # Test completions and parallelism
  - it: should configure completions and parallelism
    set:
      jobs:
        restore:
          enabled: true
          completions: 5
          parallelism: 2
          podSpec:
            containers:
              restore:
                image:
                  repository: postgres
                  tag: "16"
    asserts:
      - equal:
          path: spec.completions
          value: 5
      - equal:
          path: spec.parallelism
          value: 2

  - it: should preserve numeric-zero values (backoffLimit=0, completions=0)
    set:
      jobs:
        restore:
          enabled: true
          backoffLimit: 0
          completions: 0
          parallelism: 0
          activeDeadlineSeconds: 0
          ttlSecondsAfterFinished: 0
          podSpec:
            containers:
              restore:
                image:
                  repository: postgres
                  tag: "16"
    asserts:
      - equal:
          path: spec.backoffLimit
          value: 0
      - equal:
          path: spec.completions
          value: 0
      - equal:
          path: spec.parallelism
          value: 0
      - equal:
          path: spec.activeDeadlineSeconds
          value: 0
      - equal:
          path: spec.ttlSecondsAfterFinished
          value: 0

  # Test backoff limit
  - it: should configure backoff limit
    set:
      jobs:
        restore:
          enabled: true
          backoffLimit: 10
          podSpec:
            containers:
              restore:
                image:
                  repository: postgres
                  tag: "16"
    asserts:
      - equal:
          path: spec.backoffLimit
          value: 10

  # Test active deadline seconds
  - it: should configure active deadline seconds
    set:
      jobs:
        restore:
          enabled: true
          activeDeadlineSeconds: 3600
          podSpec:
            containers:
              restore:
                image:
                  repository: postgres
                  tag: "16"
    asserts:
      - equal:
          path: spec.activeDeadlineSeconds
          value: 3600

  # Test multiple containers per job
  - it: should render multiple containers per job
    set:
      jobs:
        restore:
          enabled: true
          podSpec:
            containers:
              restore:
                image:
                  repository: postgres
                  tag: "16"
                command:
                  - pg_restore
              validator:
                image:
                  repository: postgres
                  tag: "16"
                command:
                  - psql
                  - -c
                  - "SELECT 1"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: restore
      - equal:
          path: spec.template.spec.containers[1].name
          value: validator
      - equal:
          path: spec.template.spec.containers[1].command[0]
          value: psql

  # Test volume mounts
  - it: should configure volume mounts
    set:
      jobs:
        restore:
          enabled: true
          podSpec:
            containers:
              restore:
                image:
                  repository: postgres
                  tag: "16"
                volumeMounts:
                  - name: backup-data
                    mountPath: /backup
                  - name: restore-config
                    mountPath: /etc/config
            volumes:
              - name: backup-data
                persistentVolumeClaim:
                  claimName: backup-pvc
              - name: restore-config
                secret:
                  secretName: restore-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: backup-data
            mountPath: /backup
      - contains:
          path: spec.template.spec.volumes
          content:
            name: backup-data
            persistentVolumeClaim:
              claimName: backup-pvc
      - contains:
          path: spec.template.spec.volumes
          content:
            name: restore-config
            secret:
              secretName: restore-secret

  # Test pod failure policy
  - it: should configure pod failure policy
    set:
      jobs:
        restore:
          enabled: true
          podFailurePolicy:
            rules:
              - action: FailJob
                onExitCodes:
                  containerName: restore
                  operator: In
                  values: [1, 2, 3]
              - action: Ignore
                onPodConditions:
                  - type: DisruptionTarget
          podSpec:
            containers:
              restore:
                image:
                  repository: postgres
                  tag: "16"
    asserts:
      - isNotNull:
          path: spec.podFailurePolicy
      - equal:
          path: spec.podFailurePolicy.rules[0].action
          value: FailJob
      - equal:
          path: spec.podFailurePolicy.rules[1].action
          value: Ignore
